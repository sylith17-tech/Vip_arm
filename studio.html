<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP_ARM Studio V5.5 | Professional Forensic & Beauty</title>

    <!-- Assets -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>

    <style>
        :root {
            --cyan: #00f2ff;
            --neon-pink: #ff007a;
            --deep-blue: #010409;
            --glass: rgba(13, 17, 23, 0.85);
            --border: rgba(0, 242, 255, 0.15);
            --iphone-gold: #d4af37;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--deep-blue);
            color: #e6edf3;
            font-family: 'Cairo', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Modern Glass Header */
        header {
            padding: 12px 20px;
            background: var(--glass);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            z-index: 1000;
        }

        .logo-area { display: flex; align-items: center; gap: 10px; }
        .system-status { font-family: 'JetBrains Mono'; font-size: 0.75rem; color: var(--cyan); letter-spacing: 1px; }

        /* Workspace Grid */
        .app-core { flex: 1; display: flex; position: relative; overflow: hidden; }

        /* Canvas Optimization */
        .canvas-area {
            flex: 1;
            position: relative;
            background: radial-gradient(circle at center, #0d1117 0%, #010409 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: hidden;
        }

        canvas {
            position: absolute;
            max-width: 98%;
            max-height: 98%;
            border-radius: 12px;
            transition: filter 0.3s ease;
        }

        #overlayCanvas { z-index: 5; pointer-events: none; }

        /* Unified Control Panel */
        .panel {
            width: 340px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 900;
        }

        .panel-header {
            padding: 18px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--border);
            color: var(--cyan);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .scroll-box { padding: 20px; overflow-y: auto; flex: 1; }

        /* Interactive Elements */
        .control-group { background: rgba(255,255,255,0.02); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid transparent; }
        .control-group:hover { border-color: var(--border); }
        
        .label-row { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 10px; color: #8b949e; }
        
        input[type="range"] {
            width: 100%; height: 5px; accent-color: var(--cyan); background: #30363d; border-radius: 5px; cursor: pointer;
        }

        .filter-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        
        .btn {
            background: #21262d; border: 1px solid #30363d; padding: 10px; border-radius: 8px;
            color: #c9d1d9; font-size: 0.75rem; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn:hover { background: #30363d; border-color: var(--cyan); color: var(--cyan); }
        .btn.active { background: var(--cyan); color: #000; font-weight: bold; }
        
        .btn-beauty { border-color: var(--iphone-gold); color: var(--iphone-gold); }
        .btn-beauty:hover { background: var(--iphone-gold); color: #000; }

        /* Terminal Output */
        .terminal-container { height: 120px; background: #000; border-top: 1px solid var(--border); padding: 10px; font-family: 'JetBrains Mono'; font-size: 0.7rem; overflow-y: auto; }
        .log-entry { margin-bottom: 4px; border-right: 2px solid var(--cyan); padding-right: 8px; }

        /* Responsive Mobile Layout */
        @media (max-width: 850px) {
            .app-core { flex-direction: column; }
            .panel { width: 100%; height: 50%; border-left: none; border-top: 1px solid var(--border); position: absolute; bottom: 0; transform: translateY(100%); }
            .panel.active { transform: translateY(0); }
            .mobile-toolbar { display: flex; background: #010409; padding: 12px; border-top: 1px solid var(--border); justify-content: space-around; }
        }
        @media (min-width: 851px) { .mobile-toolbar { display: none; } .panel { transform: none !important; } }

        .drop-zone { border: 2px dashed #30363d; padding: 40px; border-radius: 20px; text-align: center; color: #8b949e; cursor: pointer; }
        .drop-zone i { font-size: 2.5rem; color: var(--cyan); margin-bottom: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <i class="fas fa-microchip" style="color: var(--cyan); font-size: 1.5rem;"></i>
        <div>
            <div style="font-weight: bold; font-size: 0.9rem;">VIP_ARM STUDIO</div>
            <div class="system-status">VERSION 5.5 // STABLE</div>
        </div>
    </div>
    <div style="display: flex; gap: 8px;">
        <button class="btn" onclick="triggerUpload()"><i class="fas fa-upload"></i></button>
        <button class="btn" onclick="exportArt()" style="border-color: var(--neon-pink);"><i class="fas fa-save"></i> حفظ</button>
    </div>
</header>

<div class="app-core">
    <!-- Filters & Beauty Panel -->
    <aside class="panel" id="panel-filters">
        <div class="panel-header"><i class="fas fa-wand-magic-sparkles"></i> الفلاتر والتجميل</div>
        <div class="scroll-box">
            
            <div class="control-group">
                <button class="btn btn-beauty" style="width: 100%;" onclick="toggleBeauty()">
                    <i class="fas fa-face-smile"></i> فلتر تجميل VIP_ARM (آيفون)
                </button>
                <div id="beautyLevelBox" class="hidden" style="margin-top:10px;">
                    <label class="label-row">قوة التنعيم <span id="val-bt">50%</span></label>
                    <input type="range" id="beautyRange" min="0" max="100" value="50" oninput="applyAll()">
                </div>
            </div>

            <div class="label-row">7 فلاتر احترافية</div>
            <div class="filter-grid">
                <button class="btn" onclick="setFilter('none')">الأصلي</button>
                <button class="btn" onclick="setFilter('cinematic')">Cinematic</button>
                <button class="btn" onclick="setFilter('bw_gold')">B&W Gold</button>
                <button class="btn" onclick="setFilter('vivid')">Vivid HD</button>
                <button class="btn" onclick="setFilter('midnight')">Midnight</button>
                <button class="btn" onclick="setFilter('retro')">Retro Cam</button>
                <button class="btn" onclick="setFilter('sunset')">Sunset</button>
                <button class="btn" onclick="setFilter('glow')">Dreamy Glow</button>
            </div>

            <div style="margin-top: 20px;">
                <div class="control-group">
                    <label class="label-row">السطوع <span id="val-br">100%</span></label>
                    <input type="range" id="br" min="0" max="200" value="100" oninput="applyAll()">
                </div>
                <div class="control-group">
                    <label class="label-row">الحدة <span id="val-ct">100%</span></label>
                    <input type="range" id="ct" min="0" max="200" value="100" oninput="applyAll()">
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Viewport -->
    <main class="canvas-area">
        <div id="dropPrompt" class="drop-zone" onclick="triggerUpload()">
            <i class="fas fa-expand-arrows-alt"></i>
            <p>قم بسحب الصورة أو النقر للبدء</p>
        </div>
        <canvas id="mainCanvas"></canvas>
        <canvas id="overlayCanvas"></canvas>
    </main>

    <!-- AI & Forensic Panel -->
    <aside class="panel" id="panel-ai">
        <div class="panel-header"><i class="fas fa-fingerprint"></i> التحليل الذكي</div>
        <div class="scroll-box">
            <button class="btn btn-main" id="aiBtn" onclick="initAI()" style="width:100%; padding:15px; background:var(--cyan); color:#000; font-weight:bold;">
                <i class="fas fa-brain"></i> تشغيل محرك VIP_ARM AI
            </button>

            <div id="aiTools" class="hidden" style="margin-top: 15px;">
                <div class="filter-grid">
                    <button class="btn" onclick="detectFaces(false)"><i class="fas fa-user-check"></i> كشف وجوه</button>
                    <button class="btn" onclick="detectFaces(true)"><i class="fas fa-project-diagram"></i> نقاط حيوية</button>
                    <button class="btn" onclick="anonymize()"><i class="fas fa-low-vision"></i> تجهيل</button>
                    <button class="btn" onclick="clearOverlay()"><i class="fas fa-trash"></i> مسح</button>
                </div>
            </div>

            <div class="control-group" style="margin-top: 20px;">
                <label class="label-row">البحث الجنائي (OSINT)</label>
                <input type="text" placeholder="أدخل المعرف أو الرابط..." style="width: 100%; background: #0d1117; border: 1px solid #30363d; padding: 10px; border-radius: 8px; color: var(--cyan);">
                <button class="btn" style="width: 100%; margin-top: 10px;" onclick="addLog('System: جاري فحص قواعد البيانات...')">فحص العمق</button>
            </div>
        </div>

        <div class="terminal-container" id="terminal">
            <div class="log-entry">> Initializing VIP_ARM OS V5.5... Ready.</div>
        </div>
    </aside>
</div>

<nav class="mobile-toolbar">
    <button class="btn" onclick="togglePanel('filters')"><i class="fas fa-sliders-h"></i></button>
    <button class="btn" onclick="togglePanel('ai')"><i class="fas fa-shield-alt"></i></button>
</nav>

<input type="file" id="fileInput" hidden accept="image/*">

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlayCanvas');
    const octx = overlay.getContext('2d');
    const fileInput = document.getElementById('fileInput');
    
    let rawImg = null;
    let activeFilter = 'none';
    let aiReady = false;
    let beautyOn = false;

    function triggerUpload() { fileInput.click(); }

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                rawImg = img;
                resizeCanvas();
                document.getElementById('dropPrompt').classList.add('hidden');
                addLog("System: تم تحميل البيانات بنجاح.");
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    function resizeCanvas() {
        if(!rawImg) return;
        const container = document.querySelector('.canvas-area');
        const ratio = Math.min(container.clientWidth / rawImg.width, container.clientHeight / rawImg.height) * 0.95;
        canvas.width = overlay.width = rawImg.width * ratio;
        canvas.height = overlay.height = rawImg.height * ratio;
        applyAll();
    }

    function applyAll() {
        if(!rawImg) return;
        
        // Update Labels
        document.getElementById('val-br').innerText = document.getElementById('br').value + '%';
        document.getElementById('val-ct').innerText = document.getElementById('ct').value + '%';
        document.getElementById('val-bt').innerText = document.getElementById('beautyRange').value + '%';

        ctx.clearRect(0,0, canvas.width, canvas.height);
        
        let filters = `brightness(${document.getElementById('br').value}%) contrast(${document.getElementById('ct').value}%) `;
        
        // 7 Professional Filters Logic
        switch(activeFilter) {
            case 'cinematic': filters += 'saturate(1.2) contrast(1.1) hue-rotate(-5deg)'; break;
            case 'bw_gold': filters += 'grayscale(1) contrast(1.2) sepia(0.2)'; break;
            case 'vivid': filters += 'saturate(1.8) contrast(1.1)'; break;
            case 'midnight': filters += 'brightness(0.8) hue-rotate(190deg) saturate(1.2)'; break;
            case 'retro': filters += 'sepia(0.4) contrast(0.9) saturate(1.1)'; break;
            case 'sunset': filters += 'hue-rotate(-20deg) saturate(1.5) brightness(1.1)'; break;
            case 'glow': filters += 'brightness(1.1) saturate(1.2) blur(0.5px)'; break;
        }

        // Apply Beauty (iPhone Style)
        if(beautyOn) {
            const bVal = document.getElementById('beautyRange').value;
            filters += `saturate(${1 + bVal/500}) contrast(${1 + bVal/1000}) `;
            ctx.shadowBlur = bVal / 10;
            ctx.shadowColor = "rgba(255,255,255,0.2)";
        } else {
            ctx.shadowBlur = 0;
        }

        ctx.filter = filters;
        ctx.drawImage(rawImg, 0, 0, canvas.width, canvas.height);
    }

    function setFilter(f) {
        activeFilter = f;
        applyAll();
        addLog(`Filter: تم تفعيل وضع ${f}`);
    }

    function toggleBeauty() {
        beautyOn = !beautyOn;
        document.getElementById('beautyLevelBox').classList.toggle('hidden');
        applyAll();
        addLog(beautyOn ? "Mode: تم تفعيل فلتر التجميل" : "Mode: تم إيقاف التجميل");
    }

    async function initAI() {
        addLog("AI: جاري تحميل الوحدات البيومترية...");
        try {
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
            ]);
            aiReady = true;
            document.getElementById('aiTools').classList.remove('hidden');
            document.getElementById('aiBtn').innerHTML = "<i class='fas fa-check-circle'></i> المحرك نشط";
            addLog("AI: تم التجهيز. مستعد لتحليل الصور.");
        } catch(e) {
            addLog("Error: فشل الاتصال بالشبكة العصبية.");
        }
    }

    async function detectFaces(withLandmarks = false) {
        if(!aiReady || !rawImg) return;
        clearOverlay();
        addLog("AI: جاري المسح الضوئي...");
        
        const options = new faceapi.TinyFaceDetectorOptions();
        let detections;
        
        if(withLandmarks) {
            detections = await faceapi.detectAllFaces(canvas, options).withFaceLandmarks();
            faceapi.draw.drawFaceLandmarks(overlay, detections);
            addLog(`Found: تم رسم نقاط لـ ${detections.length} وجه.`);
        } else {
            detections = await faceapi.detectAllFaces(canvas, options);
            faceapi.draw.drawDetections(overlay, detections);
            addLog(`Found: تم تحديد ${detections.length} هدف.`);
        }
    }

    async function anonymize() {
        if(!aiReady || !rawImg) return;
        const detections = await faceapi.detectAllFaces(canvas, new faceapi.TinyFaceDetectorOptions());
        detections.forEach(d => {
            const { x, y, width, height } = d.box;
            ctx.filter = 'blur(20px)';
            ctx.drawImage(canvas, x, y, width, height, x, y, width, height);
            ctx.filter = 'none';
            ctx.fillStyle = "rgba(0,0,0,0.8)";
            ctx.fillRect(x, y + height/2.5, width, height/4);
        });
        addLog("Security: تم تنفيذ بروتوكول التجهيل.");
    }

    function clearOverlay() { octx.clearRect(0,0, overlay.width, overlay.height); }

    function addLog(msg) {
        const term = document.getElementById('terminal');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `<span style="opacity:0.4">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
        term.prepend(entry);
    }

    function togglePanel(id) {
        const p = document.getElementById('panel-' + id);
        p.classList.toggle('active');
    }

    function exportArt() {
        if(!rawImg) return;
        const link = document.createElement('a');
        link.download = `VIP_ARM_STUDIO_${Date.now()}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
    }

    window.onresize = resizeCanvas;
</script>
</body>
</html>
