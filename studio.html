<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP_ARM Studio ULTIMATE | Kernel-0x0</title>

    <!-- External Assets -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f2ff;
            --primary-dark: #008a91;
            --primary-glow: rgba(0, 242, 255, 0.4);
            --bg-dark: #050b18;
            --panel-bg: rgba(13, 25, 48, 0.85);
            --glass-border: rgba(0, 242, 255, 0.15);
            --accent-pink: #ff007a;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scrollbar-width: thin; scrollbar-color: var(--primary) transparent; }
        
        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(112, 0, 255, 0.05) 0%, transparent 40%);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- Header & Layout --- */
        header {
            height: 60px;
            background: rgba(5, 11, 24, 0.95);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .brand-logo {
            font-family: 'JetBrains Mono', monospace;
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .main-container {
            display: flex;
            height: calc(100vh - 60px);
            padding: 10px;
            gap: 10px;
        }

        /* --- Sidebar & Panels --- */
        .sidebar {
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card {
            background: var(--panel-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h3 { font-size: 0.9rem; color: var(--primary); display: flex; align-items: center; gap: 8px; }

        .content-scroll { padding: 20px; overflow-y: auto; flex: 1; }

        /* --- Workspace (Center) --- */
        .workspace {
            flex: 1;
            position: relative;
            background: #020611;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }

        #mainCanvas {
            max-width: 90%;
            max-height: 90%;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- UI Components --- */
        .control-group { margin-bottom: 20px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 10px; }

        input[type="range"] {
            width: 100%;
            height: 5px;
            background: #1e293b;
            border-radius: 5px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 12px;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            font-family: 'Cairo';
            font-size: 0.8rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .action-btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 15px var(--primary-glow);
            transform: translateY(-2px);
        }

        .btn-primary { background: linear-gradient(45deg, var(--primary-dark), var(--primary)); border: none; color: #000; font-weight: bold; }

        /* --- Terminal --- */
        .terminal {
            height: 120px;
            background: rgba(0,0,0,0.7);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            padding: 15px;
            color: #10b981;
            overflow-y: auto;
            border-top: 1px solid var(--glass-border);
        }

        .terminal p::before { content: "➜ "; color: var(--accent-pink); }

        /* --- Upload Overlay --- */
        .upload-zone {
            text-align: center;
            cursor: pointer;
            padding: 40px;
            border: 2px dashed var(--glass-border);
            border-radius: 20px;
            transition: 0.3s;
        }
        .upload-zone:hover { border-color: var(--primary); background: rgba(0,242,255,0.02); }

        /* --- Tabs --- */
        .tab-nav { display: flex; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 5px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 8px; border-radius: 8px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; font-family: 'Cairo'; }
        .tab-btn.active { background: var(--primary); color: #000; font-weight: bold; }

    </style>
</head>
<body>

<header>
    <div class="brand-logo">
        <i class="fas fa-shield-halved"></i> VIP_ARM // CORE v3.0
    </div>
    <div style="display: flex; gap: 15px; align-items: center;">
        <div id="statusIndicator" style="font-family: 'JetBrains Mono'; font-size: 0.7rem; background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 4px 12px; border-radius: 20px; border: 1px solid #10b981;">
            ● SYSTEM_READY
        </div>
        <button onclick="resetStudio()" class="action-btn" style="padding: 5px 15px; border-color: var(--accent-pink); color: var(--accent-pink);">
            <i class="fas fa-power-off"></i> RESET
        </button>
    </div>
</header>

<div class="main-container">
    <!-- Right Sidebar: Image Tools -->
    <aside class="sidebar">
        <div class="card" style="flex: 1;">
            <div class="card-header">
                <h3><i class="fas fa-sliders"></i> أدوات التحكم الاحترافية</h3>
            </div>
            <div class="content-scroll">
                <div class="tab-nav">
                    <button class="tab-btn active" onclick="switchTab('adjust')">تعديلات</button>
                    <button class="tab-btn" onclick="switchTab('filters')">فلاتر</button>
                </div>

                <div id="adjust-panel">
                    <div class="control-group">
                        <label>السطوع <span id="val-br">100%</span></label>
                        <input type="range" id="br" min="0" max="200" value="100">
                    </div>
                    <div class="control-group">
                        <label>التباين <span id="val-ct">100%</span></label>
                        <input type="range" id="ct" min="0" max="200" value="100">
                    </div>
                    <div class="control-group">
                        <label>التشبع <span id="val-sat">100%</span></label>
                        <input type="range" id="sat" min="0" max="200" value="100">
                    </div>
                    <div class="control-group">
                        <label>توازن الألوان (Hue)</label>
                        <input type="range" id="hue" min="0" max="360" value="0">
                    </div>
                    <div class="control-group">
                        <label>Blur (تغبيش)</label>
                        <input type="range" id="blur" min="0" max="20" value="0">
                    </div>
                </div>

                <div id="filters-panel" style="display: none;">
                    <div class="btn-grid">
                        <button onclick="applyMagic('matrix')" class="action-btn"><i class="fas fa-code"></i> Matrix</button>
                        <button onclick="applyMagic('cyber')" class="action-btn"><i class="fas fa-bolt"></i> Cyber</button>
                        <button onclick="applyMagic('grayscale')" class="action-btn"><i class="fas fa-ghost"></i> B&W</button>
                        <button onclick="applyMagic('invert')" class="action-btn"><i class="fas fa-eye-slash"></i> Invert</button>
                        <button onclick="applyMagic('sepia')" class="action-btn"><i class="fas fa-camera-retro"></i> Sepia</button>
                        <button onclick="applyMagic('vintage')" class="action-btn"><i class="fas fa-film"></i> Vintage</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card" style="height: 250px;">
            <div class="card-header">
                <h3><i class="fas fa-terminal"></i> Terminal Logs</h3>
            </div>
            <div id="terminal" class="terminal">
                <p>Initializing VIP_ARM Forensic Environment...</p>
                <p>System: Kernel-0x0 v3.0 stable</p>
            </div>
        </div>
    </aside>

    <!-- Center: Viewport -->
    <main class="workspace" id="dropFrame" ondragover="this.style.borderColor='var(--primary)'" ondragleave="this.style.borderColor='var(--glass-border)'">
        <div id="dropPrompt" class="upload-zone" onclick="triggerUpload()">
            <i class="fas fa-upload" style="font-size: 3rem; color: var(--primary); margin-bottom: 20px;"></i>
            <h2 style="font-family: 'JetBrains Mono'; color: var(--primary);">DEPOSIT PAYLOAD</h2>
            <p style="color: var(--text-dim); margin-top: 10px;">Images, Videos or RAW data streams</p>
        </div>
        
        <canvas id="mainCanvas"></canvas>
    </main>

    <!-- Left Sidebar: AI & Export -->
    <aside class="sidebar">
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-robot"></i> محرك الفيديو AI</h3>
            </div>
            <div class="content-scroll">
                <div class="control-group">
                    <label>رابط المصدر (YouTube/URL)</label>
                    <input type="text" id="videoUrl" placeholder="https://..." style="width: 100%; background: #000; border: 1px solid var(--glass-border); padding: 12px; border-radius: 8px; color: var(--primary); font-family: 'JetBrains Mono';">
                </div>
                <button onclick="processVideo('shorts')" class="action-btn btn-primary" style="width: 100%; margin-bottom: 10px;">
                    <i class="fas fa-wand-magic-sparkles"></i> تحويل إلى Shorts الذكي
                </button>
                <button onclick="processVideo('dub')" class="action-btn" style="width: 100%;">
                    <i class="fas fa-microphone-lines"></i> AI Dubbing (العربية)
                </button>
            </div>
        </div>

        <div class="card" style="margin-top: auto;">
            <div class="card-header">
                <h3><i class="fas fa-file-export"></i> التصدير النهائي</h3>
            </div>
            <div class="content-scroll">
                <button onclick="exportArt()" class="action-btn btn-primary" style="width: 100%; padding: 15px;">
                    <i class="fas fa-download"></i> تحميل بجودة عالية (PNG)
                </button>
                <p style="text-align: center; font-size: 0.6rem; color: var(--text-dim); margin-top: 15px;">
                    Authorized by VIP_ARM Security Division
                </p>
            </div>
        </div>
    </aside>
</div>

<input type="file" id="imageLoader" style="display: none;" accept="image/*,video/*">

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const loader = document.getElementById('imageLoader');
    let rawImg = null;
    let currentFilter = '';

    // --- Core UI Functions ---
    function switchTab(tab) {
        document.getElementById('adjust-panel').style.display = tab === 'adjust' ? 'block' : 'none';
        document.getElementById('filters-panel').style.display = tab === 'filters' ? 'block' : 'none';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(tab === 'adjust' ? 'تعديلات' : 'فلاتر')));
    }

    function triggerUpload() { loader.click(); }

    loader.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        if (file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    rawImg = img;
                    initCanvas();
                    document.getElementById('dropPrompt').style.display = 'none';
                    canvas.style.display = 'block';
                    addLog(`DATA_INJECTED: ${file.name} | ${img.width}x${img.height}`);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        } else {
            addLog('VIDEO_STREAM_DETECTED: Preparing AI Processing Core...');
        }
    });

    function initCanvas() {
        const maxWidth = window.innerWidth * 0.6;
        const maxHeight = window.innerHeight * 0.7;
        let ratio = Math.min(maxWidth / rawImg.width, maxHeight / rawImg.height);
        
        canvas.width = rawImg.width * ratio;
        canvas.height = rawImg.height * ratio;
        draw();
    }

    function draw() {
        if(!rawImg) return;
        const b = document.getElementById('br').value;
        const c = document.getElementById('ct').value;
        const s = document.getElementById('sat').value;
        const h = document.getElementById('hue').value;
        const bl = document.getElementById('blur').value;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.filter = `brightness(${b}%) contrast(${c}%) saturate(${s}%) hue-rotate(${h}deg) blur(${bl}px) ${currentFilter}`;
        ctx.drawImage(rawImg, 0, 0, canvas.width, canvas.height);
    }

    function applyMagic(type) {
        if(!rawImg) return;
        currentFilter = '';
        addLog(`FILTER_INVOKED: ${type.toUpperCase()}`);
        
        if(type === 'grayscale') currentFilter = 'grayscale(100%)';
        else if(type === 'invert') currentFilter = 'invert(100%)';
        else if(type === 'sepia') currentFilter = 'sepia(100%)';
        else if(type === 'vintage') currentFilter = 'contrast(120%) saturate(80%) sepia(30%)';
        else if(type === 'matrix') {
            draw();
            ctx.fillStyle = "rgba(0, 15, 0, 0.4)";
            ctx.fillRect(0,0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ff41";
            ctx.font = "10px monospace";
            for(let i=0; i<100; i++) ctx.fillText(Math.random().toString(2).substr(2,8), Math.random()*canvas.width, Math.random()*canvas.height);
            return;
        }
        else if(type === 'cyber') {
            draw();
            ctx.strokeStyle = "#00f2ff";
            ctx.lineWidth = 2;
            ctx.strokeRect(10, 10, canvas.width-20, canvas.height-20);
            ctx.fillStyle = "#00f2ff";
            ctx.font = "bold 14px JetBrains Mono";
            ctx.fillText(">> ENCRYPTED_STREAM_VIP_ARM", 30, 40);
            return;
        }
        draw();
    }

    async function processVideo(mode) {
        const url = document.getElementById('videoUrl').value;
        if(!url) return alert("System requires a valid URL payload!");

        updateStatus('PROCESSING');
        addLog(`AI_CORE_START: ${mode.toUpperCase()} on target ${url.substring(0,20)}...`);

        // محاكاة الاتصال بالسيرفر
        setTimeout(() => {
            addLog(`SUCCESS: ${mode} task completed.`);
            updateStatus('READY');
        }, 3000);
    }

    function addLog(msg) {
        const term = document.getElementById('terminal');
        const p = document.createElement('p');
        p.innerHTML = `<span style="color: var(--text-dim)">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
        term.prepend(p);
    }

    function updateStatus(status) {
        const node = document.getElementById('statusIndicator');
        node.innerText = `● SYSTEM_${status}`;
        node.style.color = status === 'READY' ? '#10b981' : '#ff007a';
    }

    function exportArt() {
        if(!rawImg) return;
        const link = document.createElement('a');
        link.download = `KERNEL_0x0_EXPORT_${Date.now()}.png`;
        link.href = canvas.toDataURL();
        link.click();
        addLog('FILE_EXPORTED: Check your downloads.');
    }

    function resetStudio() { if(confirm("Terminate current session?")) location.reload(); }

    // Event Listeners for sliders
    document.querySelectorAll('input[type="range"]').forEach(i => {
        i.addEventListener('input', (e) => {
            const span = document.getElementById(`val-${e.target.id}`);
            if(span) span.innerText = e.target.value + (e.target.id === 'blur' ? 'px' : '%');
            draw();
        });
    });

    // Drag & Drop
    const frame = document.getElementById('dropFrame');
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(n => {
        frame.addEventListener(n, e => { e.preventDefault(); e.stopPropagation(); });
    });
    frame.addEventListener('drop', e => {
        loader.files = e.dataTransfer.files;
        loader.dispatchEvent(new Event('change'));
    });
</script>

</body>
</html>
