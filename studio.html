<script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const loader = document.getElementById('imageLoader');
        let rawImg = null;

        function closeGuide() { document.getElementById('userGuide').style.display = 'none'; }
        function triggerUpload() { loader.click(); }

        // معالجة الصورة المرفوعة وإرسالها للسيرفر
        loader.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // الجزء الخاص بالعرض الفوري في المتصفح
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    rawImg = img;
                    initCanvas();
                    document.getElementById('dropPrompt').style.display = 'none';
                    canvas.style.display = 'block';
                    updateStatus('IMAGE_LOADED // SUCCESS');
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);

            // الجزء المصلح: إرسال الصورة فعلياً للسيرفر (FIXED)
            uploadToServer(file);
        });

        async function uploadToServer(file) {
            const formData = new FormData();
            // تم تعديل المفتاح ليتوافق مع استقبال السيرفر
            formData.append('image', file); 

            try {
                updateStatus('UPLOADING_TO_KERNEL...');
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    updateStatus('SYNC_COMPLETED // NODE: Kernel-0x0');
                    console.log("Server Response:", result);
                } else {
                    updateStatus('SYNC_ERROR // CHECK_SERVER_LOGS');
                }
            } catch (err) {
                updateStatus('OFFLINE_MODE // LOCAL_RENDER');
                console.error("Upload Error:", err);
            }
        }

        function initCanvas() {
            canvas.width = rawImg.width;
            canvas.height = rawImg.height;
            draw();
        }

        function draw() {
            if(!rawImg) return;
            const b = document.getElementById('br').value;
            const c = document.getElementById('ct').value;
            const s = document.getElementById('sat').value;
            const h = document.getElementById('hue').value;

            ctx.filter = `brightness(${b}%) contrast(${c}%) saturate(${s}%) hue-rotate(${h}deg)`;
            ctx.drawImage(rawImg, 0, 0);
        }

        // تطبيق الثيمات الاحترافية
        async function applyMagic(type) {
            if(!rawImg) return alert("خطأ: يرجى رفع صورة أولاً!");

            showLoader("جاري استدعاء وحدة Kernel-0x0...");

            setTimeout(() => {
                hideLoader();
                if(type === 'matrix') {
                    applyMatrixEffect();
                } else if(type === 'cyber') {
                    applyCyberOverlay();
                }
                updateStatus(`THEME_${type.toUpperCase()} // APPLIED`);
            }, 1500);
        }

        function applyMatrixEffect() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ff41";
            ctx.font = "15px monospace";
            for(let i=0; i<50; i++) {
                const txt = Math.random() > 0.5 ? "1" : "0";
                ctx.fillText(txt, Math.random()*canvas.width, Math.random()*canvas.height);
            }
        }

        function applyCyberOverlay() {
            ctx.strokeStyle = "var(--neon-green)";
            ctx.lineWidth = 2;
            ctx.strokeRect(20, 20, canvas.width-40, canvas.height-40);
            ctx.fillStyle = "var(--neon-green)";
            ctx.font = "20px monospace";
            ctx.fillText("VIP_ARM_SECURED", 40, 40);
        }

        function updateStatus(msg) { document.getElementById('statusMsg').innerText = msg; }
        
        function showLoader(txt) {
            const l = document.getElementById('loader');
            l.style.display = 'flex';
            document.getElementById('loaderText').innerText = txt;
        }
        
        function hideLoader() { document.getElementById('loader').style.display = 'none'; }

        function exportArt() {
            const link = document.createElement('a');
            link.download = 'VIP_ARM_ARTWORK.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // مستمعات الأحداث للسلايدرز
        document.querySelectorAll('input[type="range"]').forEach(input => {
            input.addEventListener('input', draw);
        });

        function toggleM(id) {
            const menu = document.getElementById(id);
            menu.classList.toggle('active');
        }

        function resetStudio() { location.reload(); }

        // منع السلوك الافتراضي للسحب والإفلات
        const frame = document.getElementById('frame');
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            frame.addEventListener(eventName, e => {
                e.preventDefault();
                e.stopPropagation();
            }, false);
        });

        frame.addEventListener('drop', e => {
            const dt = e.dataTransfer;
            const files = dt.files;
            if(files.length > 0) {
                loader.files = files;
                const event = new Event('change');
                loader.dispatchEvent(event);
            }
        });
    </script>
