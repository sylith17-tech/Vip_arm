<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP_ARM Studio V8.0 PRO | Kernel-0x0 Edition</title>

    <!-- Assets -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>

    <style>
        :root {
            --cyan: #00f2ff;
            --neon-pink: #ff007a;
            --deep-blue: #010409;
            --glass: rgba(13, 17, 23, 0.9);
            --border: rgba(0, 242, 255, 0.3);
            --toxic-green: #39ff14;
            --electric-purple: #9d00ff;
            --warning-gold: #ffcc00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--deep-blue);
            color: #e6edf3;
            font-family: 'Cairo', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Header */
        header {
            padding: 10px 20px;
            background: var(--glass);
            border-bottom: 2px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            z-index: 1000;
        }

        .sys-info { font-family: 'JetBrains Mono'; font-size: 0.7rem; color: var(--cyan); }

        /* Main Layout */
        .main-wrapper {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        /* Sidebar Panels */
        .side-panel {
            width: 320px;
            background: var(--glass);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 900;
        }

        .scroll-area { padding: 15px; overflow-y: auto; flex: 1; }
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 10px; }

        /* Viewport / Canvas */
        .viewport {
            flex: 1;
            background: radial-gradient(circle at center, #0d1117 0%, #010409 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            position: relative;
        }

        #mainCanvas {
            max-width: 100%;
            max-height: 100%;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
        }

        #overlayCanvas { position: absolute; pointer-events: none; z-index: 10; }

        /* Buttons & UI Elements */
        .btn {
            background: #161b22; border: 1px solid #30363d; padding: 12px; border-radius: 8px;
            color: #c9d1d9; font-size: 0.7rem; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 6px;
        }
        .btn:hover { border-color: var(--cyan); background: rgba(0, 242, 255, 0.1); }
        .btn.active { border-color: var(--toxic-green); background: rgba(57, 255, 20, 0.1); color: var(--toxic-green); }

        .btn-main { flex-direction: row; justify-content: center; width: 100%; font-weight: bold; margin-bottom: 10px; }
        .btn-upgrade { border-color: var(--electric-purple); color: var(--electric-purple); }

        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }

        .section-tag { font-size: 0.65rem; color: #8b949e; margin-bottom: 10px; border-right: 3px solid var(--cyan); padding-right: 8px; text-transform: uppercase; }

        /* Terminal Footer */
        .console {
            height: 100px;
            background: #000;
            padding: 10px;
            font-family: 'JetBrains Mono';
            font-size: 0.65rem;
            color: #6e7681;
            overflow-y: auto;
            border-top: 1px solid var(--border);
        }

        /* Mobile Optimization */
        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; }
            .side-panel { width: 100%; height: 45%; position: fixed; bottom: 0; left: 0; transform: translateY(100%); }
            .side-panel.open { transform: translateY(0); }
            .mobile-nav { display: flex; position: fixed; bottom: 10px; right: 10px; z-index: 1001; }
            .toggle-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--cyan); color: #000; border: none; }
        }

        .badge { background: var(--neon-pink); color: #fff; font-size: 0.5rem; padding: 2px 5px; border-radius: 4px; vertical-align: middle; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:10px;">
        <i class="fas fa-microchip" style="color:var(--cyan)"></i>
        <div>
            <div style="font-weight:bold; font-size:0.85rem;">VIP_ARM STUDIO <span class="badge">V8.0 PRO</span></div>
            <div class="sys-info">> KERNEL-0x0: ROOT_ACTIVE</div>
        </div>
    </div>
    <div style="display:flex; gap:10px;">
        <button class="btn btn-main btn-upgrade" onclick="smartUpscale()"><i class="fas fa-expand-arrows-alt"></i> رفع الدقة AI</button>
        <button class="btn btn-main" style="border-color:var(--toxic-green); color:var(--toxic-green);" onclick="exportImage()"><i class="fas fa-download"></i> تصدير</button>
    </div>
</header>

<div class="main-wrapper">
    <!-- Left Tools -->
    <aside class="side-panel" id="toolsPanel">
        <div class="scroll-area">
            <button class="btn btn-main" id="beautyToggle" style="color:var(--warning-gold); border-color:var(--warning-gold);" onclick="toggleEnhance()">
                <i class="fas fa-magic"></i> محسن الوجوه التلقائي
            </button>

            <div class="section-tag">الفلاتر الاحترافية (21)</div>
            <div class="grid-3">
                <button class="btn" onclick="setFilter('none')"><i class="fas fa-sync"></i>الأصل</button>
                <button class="btn" onclick="setFilter('cyber')"><i class="fas fa-bolt"></i>سايبر</button>
                <button class="btn" onclick="setFilter('thermal')"><i class="fas fa-fire"></i>حراري</button>
                <button class="btn" onclick="setFilter('xray')"><i class="fas fa-bone"></i>X-Ray</button>
                <button class="btn" onclick="setFilter('vapor')"><i class="fas fa-cloud"></i>Vapor</button>
                <button class="btn" onclick="setFilter('sketch')"><i class="fas fa-pen-nib"></i>رسم</button>
                <button class="btn" onclick="setFilter('pixel')"><i class="fas fa-th"></i>بيكسل</button>
                <button class="btn" onclick="setFilter('duotone')"><i class="fas fa-palette"></i>Duo</button>
                <button class="btn" onclick="setFilter('night')"><i class="fas fa-eye"></i>ليلي</button>
            </div>

            <div class="section-tag">التحليل الجنائي & AI</div>
            <button class="btn btn-main" style="background:var(--cyan); color:#000;" onclick="initBiometrics()" id="bioBtn">
                <i class="fas fa-fingerprint"></i> تشغيل التعرف البيومتري
            </button>

            <div id="bioControls" style="display:none; margin-top:10px;" class="grid-3">
                <button class="btn" onclick="runAI('detect')"><i class="fas fa-user-focus"></i>تحديد</button>
                <button class="btn" onclick="runAI('mesh')"><i class="fas fa-project-diagram"></i>شبكة</button>
                <button class="btn" onclick="runAI('mask')"><i class="fas fa-user-secret"></i>تجهيل</button>
            </div>

            <div class="section-tag">تعديلات يدوية</div>
            <div style="font-size:0.6rem; margin-bottom:5px;">شدة الإضاءة</div>
            <input type="range" id="brightRange" min="0" max="200" value="100" style="width:100%; accent-color:var(--cyan);" oninput="render()">
        </div>
    </aside>

    <main class="viewport">
        <div id="dropZone" style="text-align:center; border:2px dashed var(--border); padding:30px; border-radius:15px; cursor:pointer;" onclick="document.getElementById('imgInput').click()">
            <i class="fas fa-upload" style="font-size:2rem; color:var(--cyan); margin-bottom:10px;"></i>
            <p style="font-size:0.8rem;">اسحب الصورة هنا أو اضغط للرفع</p>
        </div>
        <canvas id="mainCanvas"></canvas>
        <canvas id="overlayCanvas"></canvas>
    </main>
</div>

<footer class="console" id="log">
    <div>[INFO] VIP_ARM Studio V8.0 Initialized...</div>
    <div>[INFO] Waiting for user input on Kernel-0x0...</div>
</footer>

<input type="file" id="imgInput" hidden accept="image/*">

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const overlay = document.getElementById('overlayCanvas');
    const octx = overlay.getContext('2d');
    const log = document.getElementById('log');
    
    let baseImg = null;
    let activeFilter = 'none';
    let aiLoaded = false;
    let autoEnhance = false;

    // --- Core: Image Management ---
    document.getElementById('imgInput').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                baseImg = img;
                setupCanvas();
                document.getElementById('dropZone').style.display = 'none';
                printLog(`Image Loaded: ${img.width}x${img.height}`, "var(--toxic-green)");
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function setupCanvas() {
        if(!baseImg) return;
        const container = document.querySelector('.viewport');
        const ratio = Math.min((container.clientWidth-40) / baseImg.width, (container.clientHeight-40) / baseImg.height);
        canvas.width = baseImg.width * ratio;
        canvas.height = baseImg.height * ratio;
        overlay.width = canvas.width;
        overlay.height = canvas.height;
        render();
    }

    // --- Engine: Rendering & Filters ---
    function render() {
        if(!baseImg) return;
        ctx.filter = 'none';
        ctx.clearRect(0,0, canvas.width, canvas.height);

        let f = `brightness(${document.getElementById('brightRange').value}%) `;
        
        const filterMaps = {
            'cyber': 'hue-rotate(150deg) saturate(2) contrast(1.2)',
            'thermal': 'invert(1) hue-rotate(180deg) saturate(2)',
            'xray': 'grayscale(1) invert(1) contrast(1.5) brightness(1.2)',
            'vapor': 'hue-rotate(-50deg) saturate(1.5) contrast(0.9) brightness(1.1)',
            'sketch': 'grayscale(1) contrast(3) invert(0.1)',
            'pixel': 'saturate(1.5) contrast(1.2)', // Handled via JS later if needed
            'duotone': 'grayscale(1) sepia(1) hue-rotate(150deg) saturate(3)',
            'night': 'hue-rotate(90deg) brightness(1.3) contrast(1.2) sepia(0.2)',
            'none': ''
        };

        if(filterMaps[activeFilter]) f += filterMaps[activeFilter];
        if(autoEnhance) f += 'saturate(1.3) contrast(1.1) brightness(1.05) ';

        ctx.filter = f;
        ctx.drawImage(baseImg, 0, 0, canvas.width, canvas.height);

        if(activeFilter === 'pixel') {
            applyPixelate(8);
        }
    }

    function applyPixelate(size) {
        let w = canvas.width, h = canvas.height;
        ctx.drawImage(canvas, 0, 0, w, h, 0, 0, w/size, h/size);
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(canvas, 0, 0, w/size, h/size, 0, 0, w, h);
    }

    // --- Smart Upscale (Resolution Boost) ---
    function smartUpscale() {
        if(!baseImg) return;
        printLog("Running Ultra-Sharpness Engine...", "var(--warning-gold)");
        const kernel = [
            0, -1, 0,
           -1,  5, -1,
            0, -1, 0
        ];
        applyConvolution(kernel);
        printLog("Resolution Enhanced & Noise Reduced.", var(--cyan));
    }

    function applyConvolution(matrix) {
        const side = Math.round(Math.sqrt(matrix.length));
        const halfSide = Math.floor(side/2);
        const src = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const output = ctx.createImageData(canvas.width, canvas.height);
        
        for (let y=0; y<canvas.height; y++) {
            for (let x=0; x<canvas.width; x++) {
                let r=0, g=0, b=0;
                for (let cy=0; cy<side; cy++) {
                    for (let cx=0; cx<side; cx++) {
                        let scy = y + cy - halfSide;
                        let scx = x + cx - halfSide;
                        if (scy >= 0 && scy < canvas.height && scx >= 0 && scx < canvas.width) {
                            let off = (scy * canvas.width + scx) * 4;
                            let wt = matrix[cy * side + cx];
                            r += src.data[off] * wt;
                            g += src.data[off+1] * wt;
                            b += src.data[off+2] * wt;
                        }
                    }
                }
                let i = (y * canvas.width + x) * 4;
                output.data[i] = r; output.data[i+1] = g; output.data[i+2] = b; output.data[i+3] = 255;
            }
        }
        ctx.putImageData(output, 0, 0);
    }

    // --- Biometrics AI ---
    async function initBiometrics() {
        const btn = document.getElementById('bioBtn');
        btn.innerHTML = "<i class='fas fa-sync fa-spin'></i> Loading Models...";
        try {
            const URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
            await faceapi.nets.tinyFaceDetector.loadFromUri(URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(URL);
            await faceapi.nets.faceExpressionNet.loadFromUri(URL);
            aiLoaded = true;
            btn.innerHTML = "<i class='fas fa-check'></i> AI Engine Active";
            btn.style.background = "var(--toxic-green)";
            document.getElementById('bioControls').style.display = 'grid';
            printLog("AI Models Loaded: Detection, Landmarks, Expressions.");
        } catch(e) {
            printLog("Error loading AI Models", "red");
        }
    }

    async function runAI(mode) {
        if(!aiLoaded || !baseImg) return;
        octx.clearRect(0,0, overlay.width, overlay.height);
        const detections = await faceapi.detectAllFaces(canvas, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceExpressions();
        
        if(mode === 'detect') faceapi.draw.drawDetections(overlay, detections);
        if(mode === 'mesh') faceapi.draw.drawFaceLandmarks(overlay, detections);
        if(mode === 'mask') {
            detections.forEach(d => {
                const box = d.detection.box;
                ctx.fillStyle = "#000";
                ctx.fillRect(box.x, box.y + (box.height/4), box.width, box.height/3);
            });
            printLog("Identity Obfuscated Successfully.");
        }
        printLog(`AI Scan: Found ${detections.length} Target(s).`);
    }

    // --- Utilities ---
    function setFilter(f) { activeFilter = f; render(); printLog(`Filter Applied: ${f}`); }
    function toggleEnhance() { autoEnhance = !autoEnhance; document.getElementById('beautyToggle').classList.toggle('active'); render(); }
    function printLog(msg, color = "#6e7681") {
        const d = document.createElement('div');
        d.innerHTML = `<span style="color:var(--cyan)">[${new Date().toLocaleTimeString()}]</span> <span style="color:${color}">${msg}</span>`;
        log.prepend(d);
    }
    function exportImage() {
        const link = document.createElement('a');
        link.download = `VIP_ARM_V8_${Date.now()}.png`;
        link.href = canvas.toDataURL();
        link.click();
    }

    window.onresize = setupCanvas;
</script>

</body>
</html>
