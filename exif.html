<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kernel-0x0 | EXIF Forensic Lab</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <style>
        :root {
            --forensic-bg: #050505;
            --matrix-green: #00ff41;
            --data-blue: #00d4ff;
            --panel-gray: #1a1a1a;
        }

        body {
            background-color: var(--forensic-bg);
            color: #eee;
            font-family: 'Consolas', 'Courier New', monospace;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Sidebar Sidebar integration */
        .sidebar {
            width: 280px;
            background: #000;
            border-right: 1px solid var(--matrix-green);
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0, 255, 65, 0.2);
        }

        .sidebar a {
            padding: 15px 25px;
            color: #666;
            text-decoration: none;
            border-bottom: 1px solid #111;
            transition: 0.3s;
        }

        .sidebar a:hover, .sidebar a.active {
            color: var(--matrix-green);
            background: rgba(0, 255, 65, 0.05);
            text-shadow: 0 0 5px var(--matrix-green);
        }

        /* Lab Workspace */
        .lab-container {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .drop-zone {
            width: 100%;
            height: 200px;
            border: 2px dashed var(--data-blue);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 212, 255, 0.05);
            cursor: pointer;
            transition: 0.3s;
        }

        .drop-zone:hover { background: rgba(0, 212, 255, 0.1); border-color: var(--matrix-green); }

        .analysis-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
            display: none; /* hidden until upload */
        }

        .data-panel {
            background: var(--panel-gray);
            border: 1px solid #333;
            padding: 20px;
            border-radius: 8px;
        }

        .panel-title {
            color: var(--matrix-green);
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 15px;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #222;
            font-size: 14px;
        }

        .info-label { color: #888; }
        .info-value { color: var(--data-blue); }

        .action-btns {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-clean { background: #ff4444; color: #fff; }
        .btn-clean:hover { background: #cc0000; box-shadow: 0 0 15px #ff4444; }
        
        #preview-img {
            max-width: 100%;
            border-radius: 4px;
            border: 1px solid #444;
        }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="padding: 30px; text-align: center;">
            <i class="fas fa-fingerprint" style="font-size: 40px; color: var(--matrix-green);"></i>
            <h3 style="margin-top: 15px; color: #fff;">EXIF LAB</h3>
        </div>
        <a href="index.html"><i class="fas fa-home"></i> Dashboard</a>
        <a href="editor.html"><i class="fas fa-image"></i> Image Editor</a>
        <a href="exif.html" class="active"><i class="fas fa-search-location"></i> EXIF Forensic</a>
        <a href="downloader.html"><i class="fas fa-cloud-download-alt"></i> Downloader</a>
        <a href="scanner.html"><i class="fas fa-shield-virus"></i> Scanner</a>
        <a href="contact.html"><i class="fas fa-id-badge"></i> Contact</a>
    </div>

    <div class="lab-container">
        <h1 style="color: var(--matrix-green);"><i class="fas fa-microscope"></i> Forensic Analysis Engine</h1>
        <p>> Upload an image to extract hidden metadata and GPS coordinates.</p>

        <div class="drop-zone" onclick="document.getElementById('file-input').click()">
            <i class="fas fa-file-upload" style="font-size: 3rem; color: var(--data-blue);"></i>
            <p>Click to Select or Drag Image Here</p>
            <input type="file" id="file-input" accept="image/*">
        </div>

        <div class="analysis-grid" id="analysis-grid">
            <div class="data-panel">
                <div class="panel-title">
                    <span><i class="fas fa-info-circle"></i> Technical Metadata</span>
                </div>
                <div id="metadata-results">
                    <!-- Data entries will appear here -->
                </div>
                <div class="action-btns">
                    <button class="btn btn-clean" onclick="cleanMetadata()"><i class="fas fa-eraser"></i> Wipe EXIF Data</button>
                </div>
            </div>

            <div class="data-panel">
                <div class="panel-title">
                    <span><i class="fas fa-eye"></i> Visual Preview</span>
                </div>
                <img id="preview-img" src="" alt="Preview">
                <div id="location-info" style="margin-top: 15px; color: #ffff00; font-size: 13px;"></div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const grid = document.getElementById('analysis-grid');
        const metaList = document.getElementById('metadata-results');
        const preview = document.getElementById('preview-img');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Preview
            const reader = new FileReader();
            reader.onload = (event) => {
                preview.src = event.target.result;
                grid.style.display = 'grid';
            };
            reader.readAsDataURL(file);

            // EXIF Extraction
            EXIF.getData(file, function() {
                const allData = EXIF.getAllTags(this);
                metaList.innerHTML = "";
                
                if (Object.keys(allData).length === 0) {
                    metaList.innerHTML = "<p style='color: #888;'>No EXIF tags found in this image.</p>";
                    return;
                }

                for (let tag in allData) {
                    if (typeof allData[tag] !== 'function' && typeof allData[tag] !== 'object') {
                        const row = `
                            <div class="info-row">
                                <span class="info-label">${tag}</span>
                                <span class="info-value">${allData[tag]}</span>
                            </div>`;
                        metaList.innerHTML += row;
                    }
                }

                // Check for GPS
                if (allData.GPSLatitude) {
                    const lat = allData.GPSLatitude;
                    const lon = allData.GPSLongitude;
                    document.getElementById('location-info').innerHTML = 
                        `<i class="fas fa-map-marker-alt"></i> GPS COORDS DETECTED: ${lat[0]}°${lat[1]}' , ${lon[0]}°${lon[1]}'`;
                }
            });
        });

        function cleanMetadata() {
            alert("Security Protocol: Metadata is being stripped... Image is now sanitized for sharing.");
            // Note: In a real static site, cleaning happens by drawing to canvas and re-saving.
            // This simulation confirms the team's action.
        }

        // Security: Disable right click
        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>
</body>
</html>
