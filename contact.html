<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kernel-0x0 | Secure Contact</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --contact-bg: #050505;
            --gold-glow: #ffcc00;
            --deep-gold: #b8860b;
            --panel-hex: rgba(17, 17, 17, 0.9);
            --text-gray: #a0a0a0;
        }

        body {
            background-color: var(--contact-bg);
            color: #fff;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Identity */
        .sidebar {
            width: 260px;
            background: #000;
            border-right: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header {
            padding: 40px 20px;
            text-align: center;
        }

        .sidebar a {
            padding: 15px 25px;
            text-decoration: none;
            color: #555;
            display: flex;
            align-items: center;
            transition: 0.3s;
            border-left: 4px solid transparent;
        }

        .sidebar a:hover, .sidebar a.active {
            color: var(--gold-glow);
            background: rgba(255, 204, 0, 0.03);
            border-left: 4px solid var(--gold-glow);
        }

        .sidebar a i { margin-right: 15px; width: 20px; text-align: center; }

        /* Content Area & Background Animation */
        .content-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: radial-gradient(circle at center, #0f0f0f 0%, #000 100%);
        }

        #bg-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.3;
        }

        /* Profile Card */
        .profile-card {
            background: var(--panel-hex);
            border: 1px solid rgba(255, 204, 0, 0.2);
            width: 90%;
            max-width: 480px;
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            position: relative;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .profile-img-wrap {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
        }

        .profile-img {
            width: 110px;
            height: 110px;
            background: #000;
            border: 2px solid var(--gold-glow);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            color: var(--gold-glow);
            box-shadow: 0 0 25px rgba(255, 204, 0, 0.3);
        }

        .badge {
            display: inline-block;
            margin-top: 20px;
            background: rgba(255, 204, 0, 0.1);
            color: var(--gold-glow);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 204, 0, 0.2);
        }

        .stats-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 25px 0;
            text-align: left;
        }

        .stat-item {
            background: rgba(0,0,0,0.4);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #222;
        }

        .stat-item i { color: var(--gold-glow); margin-bottom: 5px; }
        .stat-item div { font-size: 11px; color: var(--text-gray); }
        .stat-item span { font-size: 13px; font-weight: 600; }

        .social-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .social-link {
            background: #111;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #222;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .social-link:hover {
            border-color: var(--gold-glow);
            color: var(--gold-glow);
            background: rgba(255, 204, 0, 0.05);
            transform: translateY(-3px);
        }

        .terminal-footer {
            margin-top: 30px;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: #444;
            border-top: 1px solid #222;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <nav class="sidebar">

        <a href="index.html"><i class="fas fa-th-large"></i> Dashboard</a>
        <a href="editor.html"><i class="fas fa-brush"></i> Image Studio</a>
        <a href="exif.html"><i class="fas fa-fingerprint"></i> EXIF Forensic</a>
        <a href="downloader.html"><i class="fas fa-cloud-download"></i> Downloader</a>
        <a href="scanner.html"><i class="fas fa-shield-halved"></i> Scanner</a>
        <a href="contact.html" class="active"><i class="fas fa-user-secret"></i> Contact HQ</a>
    </nav>

    <div class="content-area">
        <canvas id="bg-canvas"></canvas>

        <div class="profile-card">
            <div class="profile-img-wrap">
                <div class="profile-img">
                    <i class="fas fa-user-ninja"></i>
                </div>
            </div>
            
            <div class="badge">SECURED IDENTITY</div>
            <h1 style="margin: 15px 0 5px; font-size: 2rem;">VIP_ARM</h1>
            <p style="color: var(--text-gray); font-size: 14px;">Lead of <span style="color: var(--gold-glow)">Kernel-0x0</span> Research Team</p>

            <div class="stats-box">
                <div class="stat-item">
                    <i class="fas fa-code"></i>
                    <div>Core Skills</div>
                    <span>Python & C++</span>

                <div class="stat-item">

                    <div>Environment</div>
                    <span>Kali NetHunter</span>

            </div>

            <div class="social-grid">
                <a href="https://t.me/YOUR_TELEGRAM" class="social-link"><i class="fab fa-telegram"></i> Telegram</a>
                <a href="https://github.com/sylith17-tech" class="social-link"><i class="fab fa-github"></i> GitHub</a>
                <a href="#" class="social-link"><i class="fab fa-discord"></i> Discord</a>
                <a href="#" class="social-link"><i class="fab fa-x-twitter"></i> Twitter</a>

            <div class="terminal-footer">

            </div>
        </div>
    </div>

    <script>
        // Simple Particle Background
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<80; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5 + 0.2
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffcc00';
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
                p.y -= p.speed;
                if(p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        init();
        animate();

        // Lockdown
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = (e) => {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false;
        };
    </script>
</body>
</html>
