    <!-- ربط ملف JavaScript الخارجي -->
    <script src="script.js"></script>
    <script>
        // Particle Background Logic
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<60; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5 + 0.1
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffcc0033';
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
                p.y -= p.speed;
                if(p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(animate);
        }

        init();
        animate();

        // Secure Bridge Function (سيتم ربطه بـ app.py لاحقاً)
        async function sendToBridge() {
            const subject = document.getElementById('subject').value;
            const message = document.getElementById('message').value;

            if(!subject || !message) {
                alert("CRITICAL ERROR: NULL_PAYLOAD_DETECTED");
                return;
            }

            // إرسال البيانات إلى app.py
            try {
                const response = await fetch('/send_message', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ subject, message })
                });
                
                if(response.ok) {
                    alert("SUCCESS: Data transmitted to VIP_ARM via secure tunnel.");
                } else {
                    alert("ERROR: Transmission failed. Check Backend.");
                }
            } catch (e) {
                console.log("Offline Mode: Message queued locally.");
                alert("SYSTEM: Bridge not found. Are we running on Render yet?");
            }
        }
    </script>
