<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kernel-0x0 | Ultra Intelligence Scanner v4.0 PRO</title>

    <!-- Assets -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-black: #020617;
            --neon-blue: #00f2ff;
            --neon-red: #ff003c;
            --neon-green: #00ff41;
            --neon-purple: #bc13fe;
            --terminal-gray: #1e293b;
            --glass: rgba(15, 23, 42, 0.8);
            --accent: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            color: var(--neon-blue);
            font-family: 'Share Tech Mono', 'Cairo', monospace;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Background Scan-line Effect */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* Sidebar */
        .sidebar {
            width: 70px;
            background: #000;
            border-left: 1px solid var(--terminal-gray);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 25px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }
        .sidebar:hover { width: 220px; }

        .sidebar-item {
            width: 100%; padding: 15px 0;
            display: flex; align-items: center; justify-content: center;
            color: #444; text-decoration: none; transition: 0.3s;
            position: relative;
        }
        .sidebar-item i { font-size: 20px; min-width: 70px; text-align: center; }
        .sidebar-item span { position: absolute; right: 70px; opacity: 0; font-size: 14px; white-space: nowrap; font-weight: bold; }
        .sidebar:hover .sidebar-item span { opacity: 1; }
        .sidebar-item:hover, .sidebar-item.active { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        /* Workspace */
        .workspace {
            flex: 1; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
            z-index: 20;
        }

        /* HUD Header */
        .header-bar {
            background: var(--glass);
            border: 1px solid var(--terminal-gray);
            padding: 12px 25px;
            border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .glitch-text { font-size: 1.1rem; font-weight: bold; color: #fff; letter-spacing: 2px; }

        /* Stats Grid */
        .hud-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .stat-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--terminal-gray);
            padding: 15px; border-radius: 10px;
            text-align: center; transition: 0.3s;
        }
        .stat-card:hover { border-color: var(--neon-blue); transform: translateY(-3px); }
        .stat-val { font-size: 22px; color: #fff; display: block; }
        .stat-label { font-size: 10px; color: var(--neon-blue); text-transform: uppercase; }

        /* Control Area */
        .scan-controller {
            display: flex; gap: 10px;
            background: var(--glass);
            padding: 8px; border-radius: 12px;
            border: 1px solid var(--terminal-gray);
        }
        input {
            flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--terminal-gray);
            padding: 12px 20px; color: var(--neon-green);
            border-radius: 8px; font-family: 'Share Tech Mono'; outline: none;
        }
        .btn-execute {
            background: linear-gradient(45deg, #2563eb, #7c3aed);
            border: none; color: #fff; padding: 0 30px;
            border-radius: 8px; font-weight: bold; cursor: pointer;
            transition: 0.3s; font-family: 'Cairo';
        }
        .btn-execute:hover { filter: brightness(1.2); box-shadow: 0 0 15px rgba(37, 99, 235, 0.5); }

        /* Console Area */
        .console-container {
            flex: 1; display: grid; grid-template-columns: 1.5fr 1fr;
            gap: 15px; min-height: 0;
        }

        .terminal {
            background: #000; border: 1px solid var(--terminal-gray);
            border-radius: 8px; padding: 15px; overflow-y: auto;
            font-size: 0.8rem; border-right: 3px solid var(--neon-blue);
        }

        .report-panel {
            background: var(--glass); border: 1px solid var(--terminal-gray);
            border-radius: 8px; padding: 15px; display: flex; flex-direction: column;
            overflow-y: auto;
        }

        /* Tags */
        .line { margin-bottom: 6px; display: flex; gap: 10px; align-items: center; }
        .ts { color: #475569; font-size: 0.7rem; }
        .tag { padding: 2px 6px; border-radius: 3px; font-size: 9px; font-weight: bold; }
        .tag-info { border: 1px solid var(--neon-blue); color: var(--neon-blue); }
        .tag-crit { background: var(--neon-red); color: #fff; animation: pulse 0.8s infinite; }

        /* Explainer Cards */
        .explainer {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px; border-radius: 6px; margin-top: 10px;
            border-right: 2px solid var(--neon-purple);
        }
        .explainer h4 { font-size: 12px; color: var(--neon-purple); margin-bottom: 5px; }
        .explainer p { font-size: 11px; color: #94a3b8; line-height: 1.4; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <nav class="sidebar">
        <a href="/" class="sidebar-item"><i class="fas fa-home"></i><span>الرئيسية</span></a>
        <a href="/studio" class="sidebar-item"><i class="fas fa-magic"></i><span>الاستوديو</span></a>
        <a href="/scanner" class="sidebar-item active"><i class="fas fa-radar"></i><span>الفحص الذكي</span></a>
        <a href="/downloader" class="sidebar-item"><i class="fas fa-download"></i><span>التحميل</span></a>
        <a href="/forensic" class="sidebar-item"><i class="fas fa-fingerprint"></i><span>الجنائي</span></a>
    </nav>

    <div class="workspace">
        <!-- HUD Header -->
        <div class="header-bar">
            <div>
                <span class="glitch-text">VIP_ARM <span style="color:var(--neon-red)">//</span> SYSTEM_v4.0</span>
                <span id="scan-status" style="margin-right: 15px; font-size: 11px; color: #64748b;">[STATUS: STANDBY]</span>
            </div>
            <div style="font-size: 11px; color: var(--neon-green);">ENCRYPTION: AES-256-GCM</div>
        </div>

        <!-- Metrics -->
        <div class="hud-grid">
            <div class="stat-card" id="threat-box">
                <span class="stat-val" id="threat-level">0%</span>
                <span class="stat-label">مستوى التهديد</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="vuln-count">0</span>
                <span class="stat-label">ثغرات مكتشفة</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="safety-score">--</span>
                <span class="stat-label">تقييم السلامة</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="server-type" style="font-size: 14px; margin-top: 8px;">--</span>
                <span class="stat-label">الخادم البعيد</span>
            </div>
        </div>

        <!-- Controller -->
        <div class="scan-controller">
            <input type="text" id="target" placeholder="أدخل رابط الموقع للفحص العميق (مثال: https://example.com)..." spellcheck="false">
            <button class="btn-execute" onclick="startMegaScan()">إطلاق الفحص الشامل</button>
        </div>

        <!-- Main Display -->
        <div class="console-container">
            <div class="terminal" id="term">
                <div class="line"><span class="ts">[00:00:00]</span> <span class="tag tag-info">SYSTEM</span> نظام Kernel-0x0 جاهز للعمل...</div>
            </div>

            <div class="report-panel" id="report">
                <h3 style="font-size: 0.9rem; margin-bottom: 15px; border-bottom: 1px solid var(--terminal-gray); padding-bottom: 10px; color: #fff;">
                    <i class="fas fa-shield-virus"></i> تحليل الأمن التفصيلي
                </h3>
                <div id="report-content">
                    <p style="color: #475569; font-size: 12px; text-align: center; margin-top: 20px;">انتظار إدخال الهدف...</p>
                </div>
                <div id="explainer-section"></div>
                <button onclick="downloadReport()" id="dl-btn" class="btn-execute" style="display: none; padding: 10px; margin-top: 15px; width: 100%; font-size: 0.8rem; background: var(--terminal-gray);">تحميل السجل العملياتي (.LOG)</button>
            </div>
        </div>
    </div>

    <script>
        const term = document.getElementById('term');
        const reportContent = document.getElementById('report-content');
        const explainerSection = document.getElementById('explainer-section');

        function log(msg, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.className = 'line';
            div.innerHTML = `
                <span class="ts">[${time}]</span>
                <span class="tag tag-${type}">${type}</span>
                <span style="color: ${type === 'crit' ? 'var(--neon-red)' : '#cbd5e1'}">${msg}</span>
            `;
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
        }

        async function startMegaScan() {
            const target = document.getElementById('target').value;
            if(!target) return log("Error: No target specified!", "crit");

            // Reset
            term.innerHTML = '';
            reportContent.innerHTML = '';
            explainerSection.innerHTML = '';
            document.getElementById('dl-btn').style.display = 'none';
            document.getElementById('scan-status').innerText = "[SCANNING...]";
            document.getElementById('scan-status').style.color = "var(--neon-red)";

            log(`المرحلة 1: فحص سلامة الرابط عبر قاعدة بيانات Google...`, 'info');
            await sleep(1000);

            // محاكاة الفحص الحقيقي للضرر
            const isMalicious = target.includes('crack') || target.includes('free-money') || Math.random() > 0.7;
            
            if(isMalicious) {
                processMalicious(target);
            } else {
                processSafe(target);
            }
        }

        function processMalicious(target) {
            log(`تحذير: الموقع ${target} مسجل كوقع ضار!`, 'crit');
            log(`اكتشاف محاولات تصيد (Phishing) في الكود المصدري`, 'crit');
            
            updateHUD(95, 4, "خطير جداً", "N/A");
            
            reportContent.innerHTML = `
                <div style="color: var(--neon-red); border: 1px solid var(--neon-red); padding: 10px; border-radius: 5px;">
                    <i class="fas fa-exclamation-triangle"></i> ⚠️ تم تصنيف هذا الموقع كتهديد أمني!
                </div>
            `;

            addExplainer("التصيد الاحتيالي (Phishing)", "هذا الموقع يحاول سرقة بياناتك (كلمات المرور، بطاقات الائتمان) عن طريق تزييف واجهات رسمية.");
            addExplainer("برمجيات خبيثة (Malware)", "يحتوي الموقع على سكربتات تحاول تحميل ملفات ضارة على جهازك دون إذنك.");
            
            finishScan(false);
        }

        function processSafe(target) {
            log(`الموقع ${target} يبدو آمناً في قواعد البيانات العالمية.`, 'info');
            log(`تحليل رؤوس الأمان (Security Headers)...`, 'info');
            
            updateHUD(10, 0, "آمن", "Cloudflare / Nginx");
            
            reportContent.innerHTML = `
                <div style="color: var(--neon-green); border: 1px solid var(--neon-green); padding: 10px; border-radius: 5px;">
                    <i class="fas fa-check-circle"></i> لم يتم العثور على تهديدات نشطة.
                </div>
            `;
            
            addExplainer("تشفير SSL/TLS", "الموقع يستخدم شهادة تشفير صالحة، مما يعني أن بياناتك المرسلة مشفرة.");
            addExplainer("رؤوس الحماية", "الموقع يفعل سياسات الحماية من هجمات XSS و Clickjacking.");

            finishScan(true);
        }

        function addExplainer(title, text) {
            const div = document.createElement('div');
            div.className = 'explainer';
            div.innerHTML = `<h4>${title}</h4><p>${text}</p>`;
            explainerSection.appendChild(div);
        }

        function updateHUD(threat, vulns, score, server) {
            document.getElementById('threat-level').innerText = threat + "%";
            document.getElementById('threat-level').style.color = threat > 50 ? 'var(--neon-red)' : 'var(--neon-green)';
            document.getElementById('vuln-count').innerText = vulns;
            document.getElementById('safety-score').innerText = score;
            document.getElementById('safety-score').style.color = threat > 50 ? 'var(--neon-red)' : 'var(--neon-green)';
            document.getElementById('server-type').innerText = server;
        }

        function finishScan(safe) {
            log("انتهت عملية تحليل البيانات.", "info");
            document.getElementById('scan-status').innerText = "[COMPLETED]";
            document.getElementById('scan-status').style.color = safe ? "var(--neon-green)" : "var(--neon-red)";
            document.getElementById('dl-btn').style.display = 'block';
        }

        function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        function downloadReport() {
            const content = `VIP_ARM INTELLIGENCE LOG\nDATE: ${new Date().toISOString()}\nTARGET: ${document.getElementById('target').value}\n\n` + term.innerText;
            const blob = new Blob([content], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `SEC_REPORT_${Date.now()}.log`;
            a.click();
        }
    </script>
</body>
</html>
