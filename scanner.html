<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kernel-0x0 | Network Recon Scanner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --scan-bg: #020408;
            --neon-cyan: #00f2ff;
            --dark-cyan: #003d4d;
            --text-main: #a2f9ff;
            --danger: #ff0055;
            --success: #00ff41;
        }

        body {
            background-color: var(--scan-bg);
            color: var(--text-main);
            font-family: 'Segoe UI', monospace;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar - توحيد التصميم مع الصفحة الرئيسية */
        .sidebar {
            width: 260px;
            background: #000;
            border-right: 2px solid var(--dark-cyan);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100%;
            z-index: 100;
        }

        .sidebar-header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid #111;
        }

        .sidebar a {
            padding: 15px 25px;
            text-decoration: none;
            color: #666;
            display: flex;
            align-items: center;
            transition: 0.3s;
            border-left: 4px solid transparent;
        }

        .sidebar a:hover, .sidebar a.active {
            color: var(--neon-cyan);
            background: rgba(0, 242, 255, 0.05);
            border-left: 4px solid var(--neon-cyan);
        }

        .sidebar a i { margin-right: 15px; width: 20px; text-align: center; }

        /* Main Area */
        .main-container {
            margin-left: 260px;
            padding: 40px;
            width: 100%;
        }

        .scanner-header {
            background: linear-gradient(90deg, rgba(0,242,255,0.1), transparent);
            border-left: 4px solid var(--neon-cyan);
            padding: 20px;
            border-radius: 0 10px 10px 0;
            margin-bottom: 30px;
        }

        .input-box {
            display: flex;
            gap: 10px;
            background: #000;
            padding: 5px;
            border: 1px solid var(--dark-cyan);
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,242,255,0.1);
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            padding: 15px;
            color: var(--neon-cyan);
            font-size: 16px;
            outline: none;
        }

        .btn-scan {
            background: var(--neon-cyan);
            color: #000;
            border: none;
            padding: 0 40px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-scan:hover {
            box-shadow: 0 0 25px var(--neon-cyan);
            letter-spacing: 1px;
        }

        /* Results Terminal */
        .terminal {
            margin-top: 30px;
            background: #000;
            border: 1px solid #111;
            border-radius: 8px;
            height: 450px;
            display: flex;
            flex-direction: column;
        }

        .term-header {
            background: #111;
            padding: 10px 20px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            border-radius: 8px 8px 0 0;
        }

        #output {
            padding: 20px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        .log-line { margin-bottom: 8px; border-bottom: 1px solid #050505; }
        .critical { color: var(--danger); text-shadow: 0 0 5px var(--danger); }
        .success { color: var(--success); }
        .info { color: var(--neon-cyan); }

        /* Animation Progress */
        .progress-container {
            width: 100%;
            height: 2px;
            background: #111;
            margin-top: 10px;
        }
        #progress-bar { width: 0%; height: 100%; background: var(--neon-cyan); transition: 0.3s; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-user-secret" style="font-size: 50px; color: var(--neon-cyan);"></i>
            <h3 style="color: var(--neon-cyan); margin-top: 10px;">VIP_ARM</h3>
        </div>
        <a href="index.html"><i class="fas fa-columns"></i> Dashboard</a>
        <a href="editor.html"><i class="fas fa-wand-magic-sparkles"></i> Image Editor</a>
        <a href="exif.html"><i class="fas fa-microscope"></i> EXIF Forensic</a>
        <a href="downloader.html"><i class="fas fa-download"></i> Downloader</a>
        <a href="scanner.html" class="active"><i class="fas fa-shield-virus"></i> Security Scanner</a>
        <a href="contact.html"><i class="fas fa-headset"></i> Contact Team</a>
    </nav>

    <div class="main-container">
        <div class="scanner-header">
            <h1 style="margin: 0; font-size: 24px;"><i class="fas fa-satellite-dish"></i> Advanced Intelligence Scanner</h1>
            <p style="margin: 5px 0 0 0; color: #555;">Targeting global infrastructure for security vulnerabilities.</p>
        </div>

        <div class="input-box">
            <input type="text" id="target" placeholder="Enter Target Domain (e.g., example.com)">
            <button class="btn-scan" onclick="runAnalysis()">Analyze</button>
        </div>
        <div class="progress-container"><div id="progress-bar"></div></div>

        <div class="terminal">
            <div class="term-header">
                <span>STDOUT - SESSION_ACTIVE</span>
                <span>ENC: AES-256</span>
            </div>
            <div id="output">
                <span style="color: #444;">[!] System waiting for target input...</span>
            </div>
        </div>
    </div>

    <script>
        async function runAnalysis() {
            const target = document.getElementById('target').value;
            const output = document.getElementById('output');
            const bar = document.getElementById('progress-bar');
            
            if(!target) return alert("Target identification required.");

            output.innerHTML = `<div class="log-line info">[+] Initializing scan for: ${target}</div>`;
            bar.style.width = "10%";

            try {
                // محاكاة الاتصال الحقيقي بالسيرفر
                const steps = [
                    {m: "[+] Resolving DNS records...", d: 1000, p: 30},
                    {m: "[+] Pinging target node...", d: 800, p: 50},
                    {m: "[!] Analyzing HTTP Security Headers...", d: 1200, p: 70},
                    {m: "[!] Vulnerability Check: XSS, Clickjacking, MIME-Sniffing", d: 1500, p: 90}
                ];

                for(let step of steps) {
                    await new Promise(r => setTimeout(r, step.d));
                    output.innerHTML += `<div class="log-line">${step.m}</div>`;
                    bar.style.width = step.p + "%";
                }

                // طلب حقيقي لجلب بيانات الموقع عبر السيرفر
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://' + target)}`);
                const data = await response.json();

                bar.style.width = "100%";
                output.innerHTML += `<div class="log-line success">[✔] SCAN COMPLETED SUCCESSFULLY</div>`;
                output.innerHTML += `<div class="log-line">------------------------------------</div>`;
                output.innerHTML += `<div class="log-line info">Status: ${response.ok ? 'Target Reachable' : 'Target Shielded'}</div>`;
                
                if(!data.contents.includes('X-Frame-Options')) {
                    output.innerHTML += `<div class="log-line critical">[✖] CRITICAL: Clickjacking Protection (X-Frame-Options) MISSING!</div>`;
                }
                
                output.innerHTML += `<div class="log-line">Detection: Server environment identified. Analytics logged.</div>`;

            } catch (err) {
                output.innerHTML += `<div class="log-line critical">[!] ERROR: Connection refused by target firewall.</div>`;
            }
        }
    </script>
</body>
</html>
