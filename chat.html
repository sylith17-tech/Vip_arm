<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VIP_ARM | Kernel-0x0 Advanced Secure Node</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #05080f;
            --panel-dark: rgba(12, 18, 29, 0.95);
            --accent: #00f2ff;
            --danger: #ff003c;
            --text-main: #e5e7eb;
            --sent-bg: rgba(17, 34, 64, 0.8);
            --recv-bg: rgba(26, 26, 26, 0.8);
            --border: #1e293b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body, html { 
            height: 100dvh; margin: 0; padding: 0; overflow: hidden; 
            background: var(--bg-dark); font-family: 'Cairo', sans-serif; 
            color: var(--text-main); position: fixed; width: 100%; 
        }
        
        #matrix-canvas { position: fixed; top: 0; left: 0; opacity: 0.15; z-index: 0; pointer-events: none; }
        .window-blur { filter: blur(25px); transition: filter 0.3s ease; }

        #vault-lock {
            position: fixed; top:0; left:0; width:100%; height:100dvh; background: var(--bg-dark);
            z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column;
            backdrop-filter: blur(15px);
        }
        .lock-box { 
            background: var(--panel-dark); padding: 35px; border-radius: 24px; 
            border: 1px solid var(--accent); text-align: center; width: 90%; 
            max-width: 380px; box-shadow: 0 0 40px rgba(0, 242, 255, 0.15);
        }

        .app-container { display: flex; height: 100dvh; width: 100vw; position: relative; z-index: 1; }
        .chat-nav { 
            width: 280px; background: var(--panel-dark); border-left: 1px solid var(--border); 
            display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 1000; backdrop-filter: blur(10px);
        }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: transparent; min-width: 0; position: relative; }

        .messages { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; 
            flex-direction: column; gap: 15px; padding-bottom: 30px;
        }
        .msg { 
            max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; 
            position: relative; line-height: 1.5; animation: msgSlide 0.3s ease;
            word-wrap: break-word; backdrop-filter: blur(5px);
        }
        @keyframes msgSlide { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg.sent { align-self: flex-start; background: var(--sent-bg); border-bottom-left-radius: 4px; border: 1px solid #233554; }
        .msg.received { align-self: flex-end; background: var(--recv-bg); border-bottom-right-radius: 4px; border: 1px solid var(--border); }
        .msg strong { display: block; font-size: 0.75rem; color: var(--accent); margin-bottom: 4px; font-family: 'Fira Code'; }

        .input-area { 
            padding: 15px 20px calc(15px + env(safe-area-inset-bottom)); 
            background: var(--panel-dark); display: flex; gap: 12px; 
            align-items: center; border-top: 1px solid var(--border);
        }
        .input-wrapper { 
            flex: 1; background: rgba(0,0,0,0.4); border-radius: 15px; 
            padding: 2px 15px; border: 1px solid var(--border); display: flex; 
            align-items: center; transition: 0.3s;
        }
        .input-wrapper:focus-within { border-color: var(--accent); }
        .input-wrapper input { flex: 1; background: transparent; border: none; color: white; padding: 12px 5px; font-size: 1rem; }
        
        .btn-action { background: none; border: none; color: var(--accent); font-size: 1.3rem; cursor: pointer; transition: 0.2s; }
        .btn-panic { color: var(--danger); }
        .btn-send { 
            background: var(--accent); color: #000; width: 48px; height: 48px; 
            border-radius: 15px; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; border: none; transition: 0.3s;
        }

        .modal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: var(--panel-dark); padding: 25px; border-radius: 20px; 
            border: 1px solid var(--accent); z-index: 2000; display: none; 
            width: 90%; max-width: 400px; backdrop-filter: blur(20px);
        }

        .status-pill { padding: 3px 10px; border-radius: 20px; font-size: 10px; font-family: 'Fira Code'; border: 1px solid; }
        .online { border-color: #00ff88; color: #00ff88; }

        @media (max-width: 768px) {
            .chat-nav { position: absolute; right: -280px; height: 100dvh; }
            .chat-nav.active { transform: translateX(-280px); }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<canvas id="matrix-canvas"></canvas>

<div id="vault-lock">
    <div class="lock-box">
        <i class="fas fa-shield-halved" style="font-size: 3.5rem; color: var(--accent); margin-bottom: 20px;"></i>
        <h2 style="margin: 0; font-family: 'Fira Code'; letter-spacing: 2px;">SECURE VAULT</h2>
        <p id="vault-status" style="font-size: 0.85rem; color: #888; margin: 15px 0 25px;">أدخل مفتاح التشفير للوصول إلى النفق.</p>
        <input type="password" id="vault-pass" placeholder="AES Tunnel Key..." style="width: 100%; padding: 15px; background: #000; border: 1px solid var(--border); border-radius: 12px; color: var(--accent); text-align: center; margin-bottom: 20px;">
        <button onclick="unlockVault()" style="width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 12px; font-weight: bold; color: #000;">VERIFY & ENTER</button>
    </div>
</div>

<div class="app-container" id="main-app">
    <div class="chat-nav" id="sidebar">
        <div style="padding: 30px 20px; border-bottom: 1px solid var(--border);">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="status-pill online">Secure</div>
                <h3 style="color: var(--accent); font-family: 'Fira Code'; margin: 0;">KERNEL-0x0</h3>
            </div>
        </div>
        <div style="padding: 20px; display: grid; gap: 12px;">
            <button onclick="location.href='/'" style="padding:14px; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border); border-radius:12px; cursor:pointer; text-align:right;"><i class="fas fa-terminal" style="margin-left: 10px;"></i> Base Terminal</button>
            <button onclick="setupNewTunnel()" style="padding:14px; background:var(--accent); color:black; border:none; border-radius:12px; font-weight:bold; cursor:pointer; text-align:right;"><i class="fas fa-plus-square" style="margin-left: 10px;"></i> نفق جديد</button>
        </div>
        <div style="margin-top: auto; padding: 20px; border-top: 1px solid var(--border);">
            <button onclick="panicMode()" class="btn-panic" style="width:100%; padding:14px; background:rgba(255,0,60,0.1); border:1px solid var(--danger); border-radius:12px; font-weight:bold; cursor:pointer;"><i class="fas fa-radiation"></i> PANIC BUTTON</button>
        </div>
    </div>

    <div class="chat-main">
        <header style="padding: 15px 20px; background: var(--panel-dark); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); z-index: 10;">
            <div style="display: flex; align-items: center; gap: 15px;">
                 <button onclick="toggleSidebar()" class="btn-action"><i class="fas fa-bars"></i></button>
                 <div>
                    <div id="room-display" style="color: var(--accent); font-weight: bold; font-size: 0.9rem;">Connecting...</div>
                    <div style="font-size: 9px; opacity: 0.6; letter-spacing: 2px; font-family: 'Fira Code';">END-TO-END ENCRYPTED</div>
                </div>
            </div>
            <div style="display: flex; gap: 15px;">
                <button onclick="showInvite()" class="btn-action" title="دعوة"><i class="fas fa-user-plus"></i></button>
                <button onclick="clearLocalHistory()" class="btn-action" style="color: var(--danger)" title="تدمير السجل المحلي"><i class="fas fa-trash-can"></i></button>
            </div>
        </header>

        <div class="messages" id="chat-box"></div>

        <div class="input-area">
            <label class="btn-action">
                <i class="fas fa-image"></i>
                <input type="file" id="fileInp" hidden accept="image/*">
            </label>
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="تواصل بشكل آمن..." autocomplete="off">
            </div>
            <button class="btn-send" id="sendBtn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<div id="tunnelModal" class="modal">
    <h3 style="margin-top:0; color: var(--accent);">توليد نفق مشفر</h3>
    <input type="password" id="new-room-pass" placeholder="Encryption Key..." style="width: 100%; padding: 14px; background: #000; border: 1px solid var(--accent); color: white; border-radius: 10px; margin-bottom: 20px;">
    <div style="display: flex; gap: 10px;">
        <button onclick="confirmNewTunnel()" style="flex: 2; padding: 12px; background: var(--accent); border: none; border-radius: 10px; font-weight: bold; color:#000;">بدء النفق</button>
        <button onclick="closeModal()" style="flex: 1; background:#222; border:none; color:white; border-radius: 10px;">إلغاء</button>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const socket = io({ transports: ['websocket'] });
    const SYS_KEY = "CORE_V14_PRO_SYSTEM_X";
    let currentRoom = "global";
    let tunnelKey = "";
    let idleTimer;

    const myUsername = sessionStorage.getItem('chat_user') || "NODE-" + Math.random().toString(36).substr(2, 5).toUpperCase();
    sessionStorage.setItem('chat_user', myUsername);

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const room = params.get('room') || 'global';
        currentRoom = room;

        if (room === 'global') {
            document.getElementById('vault-lock').style.display = 'none';
            initChat('global', '');
        } else {
            const savedKey = sessionStorage.getItem('key_' + room);
            if(savedKey) {
                tunnelKey = savedKey;
                unlockVault();
            }
        }
        initMatrix();
        resetIdleTimer();
    };

    window.addEventListener('blur', () => document.getElementById('main-app').classList.add('window-blur'));
    window.addEventListener('focus', () => document.getElementById('main-app').classList.remove('window-blur'));

    function resetIdleTimer() {
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => {
            if(currentRoom !== 'global') location.reload();
        }, 1800000);
    }

    function unlockVault() {
        const passInp = document.getElementById('vault-pass').value || tunnelKey;
        if(!passInp && currentRoom !== 'global') return alert("مفتاح التشفير مطلوب!");
        
        tunnelKey = passInp;
        document.getElementById('vault-lock').style.display = 'none';
        sessionStorage.setItem('key_' + currentRoom, tunnelKey);
        initChat(currentRoom, tunnelKey);
    }

    function initChat(room, key) {
        socket.emit('join', { room: room, user: myUsername });
        document.getElementById('room-display').innerText = room === 'global' ? "PUBLIC_BASE" : "NODE: " + room;

        // تنظيف المستمعات القديمة لمنع التكرار
        socket.off('message');
        
        // مستمع الرسائل الجديد والمصلح
        socket.on('message', (data) => {
            const combinedKey = SYS_KEY + tunnelKey;
            try {
                const userBytes = CryptoJS.AES.decrypt(data.user, combinedKey);
                const decryptedUser = userBytes.toString(CryptoJS.enc.Utf8);
                
                if (decryptedUser !== myUsername) {
                    const msgBytes = CryptoJS.AES.decrypt(data.msg, combinedKey);
                    const originalMsg = msgBytes.toString(CryptoJS.enc.Utf8);
                    if (originalMsg) append(decryptedUser, originalMsg, 'received');
                }
            } catch (e) { console.log("إشارة مشفرة غير متوافقة."); }
        });

        // استرجاع السجل
        const savedEncrypted = localStorage.getItem('history_' + room);
        if (savedEncrypted && key) {
            try {
                const bytes = CryptoJS.AES.decrypt(savedEncrypted, SYS_KEY + key);
                document.getElementById('chat-box').innerHTML = bytes.toString(CryptoJS.enc.Utf8);
                scrollDown();
            } catch(e) { console.error("خطأ في السجل."); }
        }
    }

    const sendMsg = () => {
        const inp = document.getElementById('userInput');
        const text = inp.value.trim();
        if (!text) return;

        const combinedKey = SYS_KEY + tunnelKey;
        const encryptedMsg = CryptoJS.AES.encrypt(text, combinedKey).toString();
        const encryptedUser = CryptoJS.AES.encrypt(myUsername, combinedKey).toString();
        
        socket.emit('message', { room: currentRoom, msg: encryptedMsg, user: encryptedUser });
        append("أنت", text, 'sent');
        inp.value = "";
    };

    function append(user, msg, type) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        const msgId = 'm-' + Math.random().toString(36).substr(2, 9);
        div.className = `msg ${type}`;
        div.id = msgId;
        
        let content = msg;
        if(!msg.includes('<img')) {
            content = msg.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:var(--accent)">$1</a>');
        }

        div.innerHTML = `<strong>${user}</strong><div>${content}</div>`;
        box.appendChild(div);
        scrollDown();
        
        // تدمير ذاتي (5 ساعات)
        setTimeout(() => {
            const el = document.getElementById(msgId);
            if(el) {
                el.style.opacity = '0';
                setTimeout(() => { el.remove(); updateLocalHistory(); }, 500);
            }
        }, 18000000);

        updateLocalHistory();
    }

    function updateLocalHistory() {
        if(currentRoom === 'global') return;
        const chatHTML = document.getElementById('chat-box').innerHTML;
        const encryptedHistory = CryptoJS.AES.encrypt(chatHTML, SYS_KEY + tunnelKey).toString();
        localStorage.setItem('history_' + currentRoom, encryptedHistory);
    }

    function panicMode() {
        localStorage.clear();
        sessionStorage.clear();
        window.location.replace("https://www.google.com");
    }

    function clearLocalHistory() {
        if(confirm("سيتم تدمير كافة البيانات المحلية؟")) {
            document.getElementById('chat-box').innerHTML = "";
            localStorage.removeItem('history_' + currentRoom);
        }
    }

    function setupNewTunnel() { document.getElementById('tunnelModal').style.display = 'block'; }
    function closeModal() { document.getElementById('tunnelModal').style.display = 'none'; }

    function confirmNewTunnel() {
        const pass = document.getElementById('new-room-pass').value;
        if(!pass) return alert("المفتاح ضروري!");
        const roomId = "NODE-" + Math.random().toString(36).substr(2, 6).toUpperCase();
        sessionStorage.setItem('key_' + roomId, pass);
        window.location.href = `?room=${roomId}`;
    }

    function showInvite() {
        navigator.clipboard.writeText(window.location.href).then(() => alert("تم نسخ الرابط."));
    }

    function scrollDown() {
        const box = document.getElementById('chat-box');
        box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

    function initMatrix() {
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const chars = "010101VIP-ARM-0X0";
        const drops = Array(Math.floor(canvas.width/20)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(5, 8, 15, 0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00f2ff";
            ctx.font = "14px 'Fira Code'";
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * 20, y * 20);
                if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
    document.getElementById('sendBtn').addEventListener('click', sendMsg);

    document.getElementById('fileInp').addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const imgTag = `<img src="${e.target.result}" style="max-width:100%; border-radius:10px; margin-top:8px;">`;
                const combinedKey = SYS_KEY + tunnelKey;
                const encryptedImg = CryptoJS.AES.encrypt(imgTag, combinedKey).toString();
                const encryptedUser = CryptoJS.AES.encrypt(myUsername, combinedKey).toString();
                socket.emit('message', { room: currentRoom, msg: encryptedImg, user: encryptedUser });
                append("أنت", imgTag, 'sent');
            };
            reader.readAsDataURL(file);
        }
    });

    document.onkeydown = function(e) {
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.keyCode == 85)) return false;
    };
</script>
</body>
</html>
