<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VIP_ARM | Kernel-0x0 SECURE NODE V15</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #020408;
            --panel-dark: rgba(8, 12, 20, 0.98);
            --accent: #00f2ff;
            --danger: #ff003c;
            --success: #00ff88;
            --text-main: #e5e7eb;
            --sent-bg: rgba(10, 25, 47, 0.95);
            --recv-bg: rgba(20, 20, 20, 0.95);
            --border: #16213e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { height: 100dvh; margin: 0; padding: 0; overflow: hidden; background: var(--bg-dark); font-family: 'Cairo', sans-serif; color: var(--text-main); position: fixed; width: 100%; }
        
        /* Matrix Effect */
        #matrix-canvas { position: fixed; top: 0; left: 0; opacity: 0.12; z-index: 0; pointer-events: none; }
        .window-blur { filter: blur(40px) grayscale(1); transition: 0.5s; }

        /* Secure Overlay */
        #vault-lock { position: fixed; top:0; left:0; width:100%; height:100dvh; background: var(--bg-dark); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .lock-box { background: var(--panel-dark); padding: 45px; border-radius: 30px; border: 1px solid var(--accent); text-align: center; width: 90%; max-width: 420px; box-shadow: 0 0 60px rgba(0, 242, 255, 0.15); }

        .app-container { display: flex; height: 100dvh; width: 100vw; position: relative; z-index: 1; }
        
        /* Sidebar */
        .chat-nav { width: 280px; background: var(--panel-dark); border-left: 1px solid var(--border); display: flex; flex-direction: column; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; }
        .chat-nav.active { transform: translateX(-280px); }

        .chat-main { flex: 1; display: flex; flex-direction: column; background: transparent; min-width: 0; position: relative; }

        /* Message Logic */
        .messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 14px 20px; border-radius: 20px; font-size: 0.95rem; animation: msgArrival 0.25s cubic-bezier(0, 0.5, 0.5, 1); word-wrap: break-word; position: relative; border: 1px solid var(--border); }
        @keyframes msgArrival { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        .msg.sent { align-self: flex-start; background: var(--sent-bg); border-bottom-left-radius: 4px; border-color: rgba(0, 242, 255, 0.2); }
        .msg.received { align-self: flex-end; background: var(--recv-bg); border-bottom-right-radius: 4px; }
        .msg strong { display: block; font-size: 0.7rem; color: var(--accent); margin-bottom: 5px; font-family: 'Fira Code'; text-transform: uppercase; letter-spacing: 1px; }

        /* Controls */
        .input-area { padding: 20px; background: var(--panel-dark); display: flex; gap: 12px; align-items: center; border-top: 1px solid var(--border); }
        .input-wrapper { flex: 1; background: rgba(0,0,0,0.6); border-radius: 18px; padding: 4px 18px; border: 1px solid var(--border); display: flex; align-items: center; transition: 0.3s; }
        .input-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 242, 255, 0.1); }
        .input-wrapper input { flex: 1; background: transparent; border: none; color: white; padding: 12px; font-size: 1rem; }
        
        .btn-send { background: var(--accent); color: #000; width: 54px; height: 54px; border-radius: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; transition: 0.3s; font-size: 1.3rem; }
        .btn-send:hover { transform: scale(1.05); filter: brightness(1.1); }

        .status-tag { font-size: 10px; font-family: 'Fira Code'; padding: 2px 8px; border-radius: 10px; background: rgba(0, 255, 136, 0.1); color: var(--success); border: 1px solid var(--success); }

        @media (max-width: 768px) {
            .chat-nav { position: absolute; right: -280px; height: 100dvh; }
            .chat-nav.active { transform: translateX(-280px); }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<canvas id="matrix-canvas"></canvas>

<div id="vault-lock">
    <div class="lock-box">
        <div style="margin-bottom: 25px;">
            <i class="fas fa-user-shield" style="font-size: 4rem; color: var(--accent);"></i>
        </div>
        <h2 style="font-family: 'Fira Code'; letter-spacing: 2px; margin-bottom: 10px;">KERNEL-0x0 V15</h2>
        <p style="color: #666; font-size: 0.8rem; margin-bottom: 30px;">تحقق ثنائي من صحة النفق المشفر</p>
        <input type="password" id="vault-pass" placeholder="AES Master Key..." style="width: 100%; padding: 18px; background: #000; border: 1px solid var(--border); border-radius: 15px; color: var(--accent); text-align: center; margin-bottom: 20px; font-size: 1.1rem;">
        <button onclick="verifyTunnel()" style="width: 100%; padding: 18px; background: var(--accent); border: none; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; color: #000;">INITIALIZE SECURE LINK</button>
    </div>
</div>

<div class="app-container" id="main-app">
    <div class="chat-nav" id="sidebar">
        <div style="padding: 30px; border-bottom: 1px solid var(--border); text-align: center;">
            <h3 style="color: var(--accent); font-family: 'Fira Code'; margin: 0; letter-spacing: 3px;">K-0x0 NODE</h3>
            <span class="status-tag">ENCRYPTED STREAM</span>
        </div>
        <div style="padding: 20px; display: grid; gap: 15px;">
            <button onclick="location.href='/'" style="padding:16px; background:rgba(255,255,255,0.03); color:white; border:1px solid var(--border); border-radius:15px; cursor:pointer; text-align:right;"><i class="fas fa-terminal"></i> Terminal Home</button>
            <button onclick="createNewNode()" style="padding:16px; background:var(--accent); color:black; border:none; border-radius:15px; font-weight:bold; cursor:pointer; text-align:right;"><i class="fas fa-random"></i> نفق جديد</button>
        </div>
        <div style="margin-top: auto; padding: 25px;">
            <button onclick="panicDestruct()" style="width:100%; padding:18px; background:rgba(255,0,60,0.15); color:var(--danger); border:1px solid var(--danger); border-radius:15px; font-weight:bold; cursor:pointer;"><i class="fas fa-skull"></i> PANIC DESTRUCT</button>
        </div>
    </div>

    <div class="chat-main">
        <header style="padding: 18px 25px; background: var(--panel-dark); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); z-index: 10;">
            <div style="display: flex; align-items: center; gap: 20px;">
                <button onclick="toggleSidebar()" style="background:none; border:none; color:var(--accent); font-size:1.5rem; cursor:pointer;"><i class="fas fa-bars-staggered"></i></button>
                <div>
                    <div id="room-display" style="font-family: 'Fira Code'; color: var(--accent); font-weight: bold; font-size: 1rem;">SECURE_NODE</div>
                    <div id="sync-status" style="font-size: 9px; color: var(--success); opacity: 0.8;"><i class="fas fa-circle" style="font-size: 7px;"></i> SYNCED WITH PEER</div>
                </div>
            </div>
            <div style="display: flex; gap: 20px;">
                <button onclick="copyInvite()" style="background:none; border:none; color:var(--accent); font-size: 1.2rem; cursor:pointer;"><i class="fas fa-share-nodes"></i></button>
                <button onclick="wipeNodeHistory()" style="background:none; border:none; color:var(--danger); font-size: 1.2rem; cursor:pointer;"><i class="fas fa-biohazard"></i></button>
            </div>
        </header>

        <div class="messages" id="chat-box"></div>

        <div class="input-area">
            <label style="cursor:pointer; color:var(--accent); font-size:1.4rem;">
                <i class="fas fa-folder-open"></i>
                <input type="file" id="fileInp" hidden accept="image/*">
            </label>
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="أرسل إشارة مشفرة..." autocomplete="off">
            </div>
            <button class="btn-send" id="sendBtn"><i class="fas fa-bolt"></i></button>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const socket = io({ 
        transports: ['websocket'],
        reconnection: true,
        reconnectionDelay: 500,
        reconnectionAttempts: 50
    });

    let currentRoom = "global";
    let tunnelKey = "";
    let systemSalt = "VIP_ARM_CORE_V15_"; // طبقة حماية إضافية

    const myNodeID = sessionStorage.getItem('node_user') || "NODE-" + Math.random().toString(36).substr(2, 5).toUpperCase();
    sessionStorage.setItem('node_user', myNodeID);

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const room = params.get('room') || 'global';
        currentRoom = room;

        if (room === 'global') {
            document.getElementById('vault-lock').style.display = 'none';
            initSecureStream('global', 'PUBLIC_000');
        } else {
            const savedKey = sessionStorage.getItem('key_' + room);
            if(savedKey) {
                tunnelKey = savedKey;
                document.getElementById('vault-lock').style.display = 'none';
                initSecureStream(currentRoom, tunnelKey);
            }
        }
        initMatrixBG();
    };

    function verifyTunnel() {
        const pass = document.getElementById('vault-pass').value;
        if(!pass) return;
        
        tunnelKey = pass;
        sessionStorage.setItem('key_' + currentRoom, tunnelKey);
        document.getElementById('vault-lock').style.display = 'none';
        initSecureStream(currentRoom, tunnelKey);
    }

    function initSecureStream(room, key) {
        socket.emit('join', { room: room, user: myNodeID });
        document.getElementById('room-display').innerText = room.replace("K0X0_", "ID: ");

        socket.removeAllListeners('message');
        const comboKey = systemSalt + key;

        socket.on('message', (data) => {
            try {
                // فك تشفير فائق السرعة
                const rawMsg = CryptoJS.AES.decrypt(data.msg, comboKey).toString(CryptoJS.enc.Utf8);
                const rawUser = CryptoJS.AES.decrypt(data.user, comboKey).toString(CryptoJS.enc.Utf8);
                
                if (rawMsg && rawUser !== myNodeID) {
                    appendMessage(rawUser, rawMsg, 'received');
                    updateSyncUI(true);
                }
            } catch (e) {
                console.warn("إشارة غير صالحة - مفتاح التشفير قد يكون مختلفاً.");
                updateSyncUI(false);
            }
        });
    }

    const broadcastMessage = () => {
        const inp = document.getElementById('userInput');
        const text = inp.value.trim();
        if (!text) return;

        const keyToUse = currentRoom === 'global' ? 'PUBLIC_000' : tunnelKey;
        const comboKey = systemSalt + keyToUse;

        // تشفير كامل الحمولة (Payload)
        const encMsg = CryptoJS.AES.encrypt(text, comboKey).toString();
        const encUser = CryptoJS.AES.encrypt(myNodeID, comboKey).toString();

        socket.emit('message', { room: currentRoom, msg: encMsg, user: encUser });
        appendMessage("أنت", text, 'sent');
        inp.value = "";
    };

    function appendMessage(user, msg, type) {
        const chatBox = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        
        let content = msg;
        if(!msg.startsWith('<img')) {
            content = msg.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:var(--accent)">$1</a>');
        }
        
        div.innerHTML = `<strong>${user}</strong><div>${content}</div>`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        
        if(currentRoom !== 'global') syncLocalStorage();
    }

    function syncLocalStorage() {
        const history = document.getElementById('chat-box').innerHTML;
        const encHistory = CryptoJS.AES.encrypt(history, systemSalt + tunnelKey).toString();
        localStorage.setItem('vault_v15_' + currentRoom, encHistory);
    }

    function createNewNode() {
        const pass = prompt("أدخل مفتاح التشفير للنفق الجديد:");
        if(!pass) return;
        const newID = "K0X0_" + Math.random().toString(36).substr(2, 6).toUpperCase();
        sessionStorage.setItem('key_' + newID, pass);
        window.location.href = `?room=${newID}`;
    }

    function updateSyncUI(isSynced) {
        const el = document.getElementById('sync-status');
        if(isSynced) {
            el.innerHTML = '<i class="fas fa-circle" style="font-size: 7px;"></i> SECURE CONNECTION ACTIVE';
            el.style.color = 'var(--success)';
        } else {
            el.innerHTML = '<i class="fas fa-triangle-exclamation"></i> KEY MISMATCH DETECTED';
            el.style.color = 'var(--danger)';
        }
    }

    function copyInvite() {
        navigator.clipboard.writeText(window.location.href).then(() => alert("تم نسخ رابط النفق المشفر."));
    }

    function panicDestruct() {
        if(confirm("سيتم حذف كافة المفاتيح وسجل المحادثات فوراً؟")) {
            localStorage.clear();
            sessionStorage.clear();
            window.location.replace("https://www.google.com");
        }
    }

    function wipeNodeHistory() {
        if(confirm("تدمير السجل المحلي فقط؟")) {
            document.getElementById('chat-box').innerHTML = "";
            localStorage.removeItem('vault_v15_' + currentRoom);
        }
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

    // Socket Watchdog - منع Bad File Descriptor
    socket.on('disconnect', () => {
        console.log("إعادة مزامنة النفق...");
        socket.connect();
    });

    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') broadcastMessage(); });
    document.getElementById('sendBtn').addEventListener('click', broadcastMessage);

    function initMatrixBG() {
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const columns = Math.floor(canvas.width/20);
        const drops = Array(columns).fill(1);
        setInterval(() => {
            ctx.fillStyle = "rgba(2, 4, 8, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00f2ff";
            ctx.font = "15px 'Fira Code'";
            drops.forEach((y, i) => {
                const text = Math.random() > 0.5 ? "1" : "0";
                ctx.fillText(text, i*20, y*20);
                if(y*20 > canvas.height && Math.random() > 0.98) drops[i] = 0;
                drops[i]++;
            });
        }, 60);
    }

    // Anti-Inspect
    window.addEventListener('keydown', (e) => {
        if(e.ctrlKey && (e.key === 'u' || e.key === 'I' || e.key === 'j')) e.preventDefault();
    });
</script>
</body>
</html>
