<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const socket = io(); // سيتم الاتصال تلقائياً عند تحميل الصفحة
    let currentRoom = "global";
    const SECRET_KEY = "VIP_ARM_KERNEL_0x0";

    // الحل الجذري: الانتظار حتى يتم الاتصال الفعلي بالسيرفر قبل طلب دخول الغرفة
    socket.on('connect', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const room = urlParams.get('room');
        
        if (room) {
            joinRoom(room);
        } else {
            joinGlobal();
        }
    });

    window.onload = () => {
        initMatrix();
        simulateStats();
    };

    function joinRoom(roomId) {
        currentRoom = roomId;
        // إخبار السيرفر بربط هذا الاتصال (Socket) بالغرفة المحددة
        socket.emit('join', { room: roomId, user: "User_" + Math.floor(Math.random()*1000) });
        
        document.getElementById('room-name').innerText = roomId === 'global' ? "الدردشة العالمية" : "غرفة خاصة: " + roomId;
        logSystem(`تم تفعيل نفق التشفير للغرفة: ${roomId}`);
    }

    function joinGlobal() {
        // تنظيف الرابط من أي غرف قديمة عند العودة للعالمية
        if (window.location.search.includes('room=')) {
            window.history.pushState({}, '', window.location.pathname);
        }
        joinRoom('global');
    }

    function createPrivateRoom() {
        const roomId = "vip_" + Math.random().toString(36).substr(2, 6);
        // تحديث الرابط في المتصفح لديك أولاً
        window.history.pushState({}, '', `?room=${roomId}`);
        joinRoom(roomId);
    }

    function sendMessage() {
        const input = document.getElementById('msgInput');
        if(!input.value) return;

        const encryptedMsg = CryptoJS.AES.encrypt(input.value, SECRET_KEY).toString();
        socket.emit('message', { room: currentRoom, msg: encryptedMsg, user: "VIP_ARM" });
        
        appendMessage({ msg: input.value, user: "VIP_ARM" }, 'sent');
        input.value = "";
    }

    socket.on('message', (data) => {
        // تأكد أن الرسالة قادمة من شخص آخر وليست تكراراً لرسالتك
        try {
            const decryptedBytes = CryptoJS.AES.decrypt(data.msg, SECRET_KEY);
            const originalMsg = decryptedBytes.toString(CryptoJS.enc.Utf8);
            if (originalMsg) {
                appendMessage({ msg: originalMsg, user: data.user }, 'received');
            }
        } catch (e) {
            console.error("Encryption mismatch or corrupted data.");
        }
    });

    function appendMessage(data, type) {
        const container = document.getElementById('message-container');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = `<strong>${data.user}:</strong> <div>${data.msg}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function showInvite() {
        const modal = document.getElementById('inviteModal');
        // توليد الرابط الكامل بشكل ديناميكي
        const link = window.location.origin + window.location.pathname + "?room=" + currentRoom;
        document.getElementById('inviteLink').value = link;
        modal.style.display = 'block';
    }

    function closeInvite() { document.getElementById('inviteModal').style.display = 'none'; }

    function copyLink() {
        const copyText = document.getElementById("inviteLink");
        copyText.select();
        document.execCommand("copy");
        alert("تم نسخ الرابط! أرسله لصديقك.");
    }

    function logSystem(m) {
        const container = document.getElementById('message-container');
        container.innerHTML += `<div style="text-align:center; font-size:10px; color:var(--neon); margin: 10px 0; font-family:monospace;">> ${m}</div>`;
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        if (this.files && this.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const imgTag = `<img src="${e.target.result}" style="max-width:100%; border-radius:10px;">`;
                socket.emit('message', { room: currentRoom, msg: CryptoJS.AES.encrypt(imgTag, SECRET_KEY).toString(), user: "VIP_ARM" });
                appendMessage({ msg: imgTag, user: "VIP_ARM" }, 'sent');
            };
            reader.readAsDataURL(this.files[0]);
        }
    });

    function toggleSidebar() {
        const s = document.getElementById('sidebar');
        s.style.width = (s.style.width === '0px' || s.style.width === '') ? '300px' : '0px';
    }

    function clearMessages() {
        if(confirm("مسح المحادثة؟")) document.getElementById('message-container').innerHTML = "";
    }

    function initMatrix() {
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = "01"; const fontSize = 10;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(2, 6, 23, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00f2ff"; ctx.font = fontSize + "px monospace";
            for(let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 50);
    }

    function simulateStats() {
        setInterval(() => {
            document.getElementById('cpu-val').innerText = (Math.random() * 5 + 1).toFixed(0) + "%";
            document.getElementById('ram-val').innerText = (Math.random() * 0.2 + 1.0).toFixed(1) + "GB";
        }, 3000);
    }
</script>
