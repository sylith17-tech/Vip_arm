<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KERNEL-0X0 | OMEGA V17.2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #010409;
            --panel-dark: rgba(13, 17, 23, 0.98);
            --accent: #00f2ff;
            --danger: #ff003c;
            --success: #00ff88;
            --text-main: #e6edf3;
            --sent-bg: rgba(0, 242, 255, 0.1);
            --recv-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(48, 54, 61, 0.8);
            --sidebar-w: 300px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body, html { 
            height: 100dvh; overflow: hidden; 
            background: var(--bg-dark); font-family: 'Cairo', sans-serif; 
            color: var(--text-main); width: 100%; 
        }

        /* Container Fix for Mobile Layout */
        .app-container { 
            display: flex; 
            height: 100dvh; 
            width: 100vw; 
            position: relative;
            overflow: hidden;
        }

        /* Sidebar Improvement */
        .chat-nav { 
            width: var(--sidebar-w); background: var(--panel-dark); 
            border-left: 1px solid var(--border); display: flex; 
            flex-direction: column; z-index: 2000; height: 100%;
            transition: transform 0.3s ease;
            position: relative;
        }

        .chat-main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            min-width: 0; 
            height: 100%;
            position: relative;
            background: var(--bg-dark);
        }

        header { 
            padding: 10px 15px; 
            background: rgba(1, 4, 9, 0.95); 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        /* Sync Button Animation */
        .btn-sync.syncing i { animation: spin 1s linear infinite; color: var(--success); }
        @keyframes spin { 100% { transform: rotate(-360deg); } }

        /* Dynamic Message Box */
        .messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            background: radial-gradient(circle at center, #0d1117 0%, #010409 100%);
        }
        
        .msg { 
            max-width: 85%; padding: 10px 14px; border-radius: 15px; 
            font-size: 0.9rem; border: 1px solid var(--border); 
            position: relative; animation: slideIn 0.2s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.95); } }
        
        .msg.sent { align-self: flex-start; background: var(--sent-bg); border-bottom-left-radius: 2px; border-color: var(--accent); }
        .msg.received { align-self: flex-end; background: var(--recv-bg); border-bottom-right-radius: 2px; }

        /* Floating Input Bar - Fixed at bottom */
        .input-area { 
            padding: 12px 15px; 
            background: var(--panel-dark); 
            border-top: 1px solid var(--border);
            padding-bottom: max(12px, env(safe-area-inset-bottom));
        }

        .input-wrapper { 
            display: flex; gap: 8px; background: rgba(255,255,255,0.05); 
            padding: 5px 12px; border-radius: 25px; border: 1px solid var(--border); 
            align-items: center;
        }

        .input-wrapper input { 
            flex: 1; background: transparent; border: none; color: #fff; 
            padding: 10px 5px; font-size: 0.95rem; 
        }

        .btn-icon { 
            width: 38px; height: 38px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            background: transparent; color: var(--accent); 
            border: 1px solid transparent; cursor: pointer;
        }

        .btn-send { background: var(--accent); color: #000; }

        /* Overlay Fix */
        #vault-lock { 
            position: fixed; inset: 0; background: var(--bg-dark); 
            z-index: 9999; display: flex; align-items: center; justify-content: center;
        }

        @media (max-width: 768px) {
            .chat-nav { position: fixed; right: 0; transform: translateX(100%); width: 80%; }
            .chat-nav.open { transform: translateX(0); box-shadow: -10px 0 30px #000; }
        }

        .tunnel-item { padding: 12px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; cursor: pointer; }
        .tunnel-item.active { border-right: 4px solid var(--accent); background: rgba(0, 242, 255, 0.05); }
    </style>
</head>
<body>

<div id="vault-lock">
    <div style="text-align:center; background:var(--panel-dark); padding:30px; border-radius:20px; border:1px solid var(--accent); width:85%; max-width:350px;">
        <i class="fas fa-shield-halved" style="font-size: 3rem; color: var(--accent); margin-bottom: 15px;"></i>
        <h3 style="margin-bottom:20px; font-family:'Fira Code'">DECRYPT ACCESS</h3>
        <input type="password" id="vault-pass" placeholder="PASSWORD" style="width:100%; padding:12px; background:#000; border:1px solid var(--border); border-radius:8px; color:var(--accent); text-align:center;">
        <button onclick="attemptAccess()" style="width:100%; margin-top:15px; padding:12px; background:var(--accent); border:none; border-radius:8px; font-weight:bold;">ENTER TUNNEL</button>
    </div>
</div>

<div class="app-container">
    <aside class="chat-nav" id="sidebar">
        <div style="padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;">
            <span style="color:var(--accent); font-weight:bold;">KERNEL-0X0</span>
            <i class="fas fa-chevron-right" onclick="toggleSidebar()"></i>
        </div>
        <div id="tunnels-container" style="flex:1; overflow-y:auto; padding:15px;"></div>
        <div style="padding: 15px; border-top: 1px solid var(--border);">
            <button onclick="createNewTunnel()" style="width:100%; padding:10px; background:transparent; border:1px dashed var(--accent); color:var(--accent); border-radius:10px;">+ نفق جديد</button>
            <button onclick="panicDestruct()" style="width:100%; margin-top:10px; padding:10px; background:rgba(255,0,0,0.1); border:1px solid var(--danger); color:var(--danger); border-radius:10px;">حذف البيانات</button>
        </div>
    </aside>

    <main class="chat-main">
        <header>
            <div style="display:flex; align-items:center; gap:10px;">
                <button onclick="toggleSidebar()" class="btn-icon"><i class="fas fa-bars"></i></button>
                <div>
                    <div id="current-tunnel-name" style="font-weight:bold; font-size:0.85rem;">CONNECTING...</div>
                    <div style="font-size:0.5rem; display:flex; align-items:center;">
                        <span id="conn-status" class="status-dot" style="width:8px; height:8px; border-radius:50%; background:var(--danger); margin-left:5px;"></span>
                        <span id="protocol-info">OFFLINE</span>
                    </div>
                </div>
            </div>
            <div style="display:flex; gap:5px;">
                <!-- زر تحديث المزامنة الجديد -->
                <button onclick="forceSync()" class="btn-icon btn-sync" id="syncBtn" title="تحديث المزامنة">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <button onclick="copyTunnelURL()" class="btn-icon"><i class="fas fa-share-nodes"></i></button>
                <button onclick="clearCurrentChat()" class="btn-icon" style="color:var(--danger)"><i class="fas fa-trash-can"></i></button>
            </div>
        </header>

        <div class="messages" id="chat-box"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="رسالة مشفرة..." autocomplete="off">
                <button onclick="sendSignal()" class="btn-icon btn-send"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>
</div>

<script>
    let currentTunnelID = new URLSearchParams(window.location.search).get('room') || 'Global_Node';
    let tunnels = JSON.parse(localStorage.getItem('k0x0_tunnels')) || [{id: 'Global_Node', name: 'القناة العامة', key: 'KERNEL_DEFAULT'}];
    const myUID = localStorage.getItem('k0x0_uid') || "NODE-" + Math.random().toString(16).slice(2, 6).toUpperCase();
    localStorage.setItem('k0x0_uid', myUID);

    const socketURL = "wss://vip-arm-fixed.onrender.com/chat";
    let socket;

    function initWebSocket() {
        if (socket) socket.close();
        socket = new WebSocket(`${socketURL}?room=${currentTunnelID}`);
        
        socket.onopen = () => {
            document.getElementById('conn-status').style.background = 'var(--success)';
            document.getElementById('protocol-info').innerText = "SECURE_LINK_ACTIVE";
        };
        
        socket.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.sender !== myUID) processIncoming(data);
        };

        socket.onclose = () => {
            document.getElementById('conn-status').style.background = 'var(--danger)';
            document.getElementById('protocol-info').innerText = "LINK_BROKEN";
            setTimeout(initWebSocket, 5000);
        };
    }

    // ميزة المزامنة القسرية الجديدة
    function forceSync() {
        const btn = document.getElementById('syncBtn');
        btn.classList.add('syncing');
        
        // إعادة تهيئة الاتصال
        initWebSocket();
        
        // محاكاة جلب البيانات
        setTimeout(() => {
            loadHistory();
            btn.classList.remove('syncing');
        }, 1500);
    }

    function attemptAccess() {
        const pass = document.getElementById('vault-pass').value;
        const tunnel = tunnels.find(t => t.id === currentTunnelID);
        if (tunnel && (tunnel.id === 'Global_Node' || tunnel.key === pass)) {
            sessionStorage.setItem('unlock_' + currentTunnelID, '1');
            document.getElementById('vault-lock').style.display = 'none';
            initWebSocket();
            loadHistory();
        } else {
            alert("WRONG KEY");
        }
    }

    function sendSignal() {
        const inp = document.getElementById('userInput');
        const txt = inp.value.trim();
        if (!txt) return;

        const tunnel = tunnels.find(t => t.id === currentTunnelID);
        const encrypted = CryptoJS.AES.encrypt(txt, tunnel.key).toString();
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
        
        const payload = { encText: encrypted, sender: myUID, time: time, room: currentTunnelID };

        if (socket && socket.readyState === 1) {
            socket.send(JSON.stringify(payload));
            pushUI(txt, myUID, time, true);
            saveMsg(payload);
            inp.value = "";
        } else {
            alert("لا يوجد اتصال! حاول الضغط على زر المزامنة.");
        }
    }

    function processIncoming(data) {
        const tunnel = tunnels.find(t => t.id === currentTunnelID);
        try {
            const bytes = CryptoJS.AES.decrypt(data.encText, tunnel.key);
            const dec = bytes.toString(CryptoJS.enc.Utf8);
            if (dec) {
                pushUI(dec, data.sender, data.time, false);
                saveMsg(data);
            }
        } catch(e) {}
    }

    function pushUI(text, sender, time, isMe) {
        const box = document.getElementById('chat-box');
        const d = document.createElement('div');
        d.className = `msg ${isMe ? 'sent' : 'received'}`;
        d.innerHTML = `<div style="font-size:0.6rem; color:var(--accent); margin-bottom:4px;">${sender} • ${time}</div><div>${text}</div>`;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
    }

    function saveMsg(data) {
        let h = JSON.parse(localStorage.getItem('hist_' + currentTunnelID)) || [];
        h.push(data);
        if (h.length > 50) h.shift();
        localStorage.setItem('hist_' + currentTunnelID, JSON.stringify(h));
    }

    function loadHistory() {
        const box = document.getElementById('chat-box');
        box.innerHTML = "";
        const tunnel = tunnels.find(t => t.id === currentTunnelID);
        const h = JSON.parse(localStorage.getItem('hist_' + currentTunnelID)) || [];
        h.forEach(m => {
            try {
                const b = CryptoJS.AES.decrypt(m.encText, tunnel.key);
                pushUI(b.toString(CryptoJS.enc.Utf8), m.sender, m.time, m.sender === myUID);
            } catch(e) {}
        });
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    function createNewTunnel() {
        const n = prompt("اسم النفق:");
        const k = prompt("مفتاح التشفير:");
        if (n && k) {
            const id = "NODE_" + Math.random().toString(36).slice(2, 7).toUpperCase();
            tunnels.push({id, name: n, key: k});
            localStorage.setItem('k0x0_tunnels', JSON.stringify(tunnels));
            location.href = "?room=" + id;
        }
    }

    function copyTunnelURL() {
        navigator.clipboard.writeText(location.href);
        alert("تم نسخ رابط النفق المشفر");
    }

    function clearCurrentChat() {
        if(confirm("مسح سجل النفق؟")) { localStorage.removeItem('hist_' + currentTunnelID); location.reload(); }
    }

    function panicDestruct() {
        if(confirm("تدمير شامل لجميع البيانات؟")) { localStorage.clear(); location.href = location.pathname; }
    }

    window.onload = () => {
        const container = document.getElementById('tunnels-container');
        tunnels.forEach(t => {
            const d = document.createElement('div');
            d.className = `tunnel-item ${t.id === currentTunnelID ? 'active' : ''}`;
            d.innerHTML = `<div style="font-size:0.5rem; color:var(--accent)">${t.id}</div><div>${t.name}</div>`;
            d.onclick = () => location.href = "?room=" + t.id;
            container.appendChild(d);
        });

        const activeT = tunnels.find(t => t.id === currentTunnelID);
        document.getElementById('current-tunnel-name').innerText = activeT ? activeT.name : "UNKNOWN";

        if (currentTunnelID === 'Global_Node' || sessionStorage.getItem('unlock_' + currentTunnelID)) {
            document.getElementById('vault-lock').style.display = 'none';
            initWebSocket();
            loadHistory();
        }
    };

    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendSignal();
    });
</script>
</body>
</html>
