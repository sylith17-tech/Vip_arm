<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kernel-0x0 | Media Extraction Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --down-bg: #05010a;
            --neon-purple: #bc13fe;
            --deep-violet: #1a052e;
            --text-dim: #94a3b8;
            --success: #00f2ff;
            --danger: #ff3e3e;
        }

        body {
            background-color: var(--down-bg);
            color: #f8fafc;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sidebar Identity */
        .sidebar {
            width: 260px;
            background: #000;
            border-left: 1px solid var(--deep-violet);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100%;
            right: 0;
            z-index: 1000;
            transition: 0.3s;
        }

        .sidebar a {
            padding: 15px 25px;
            text-decoration: none;
            color: #475569;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
            border-right: 4px solid transparent;
        }

        .sidebar a:hover, .sidebar a.active {
            color: var(--neon-purple);
            background: rgba(188, 19, 254, 0.05);
            border-right: 4px solid var(--neon-purple);
        }

        /* Main Workspace */
        .main-engine {
            margin-right: 260px;
            flex: 1;
            padding: 40px;
            background: radial-gradient(circle at 10% 20%, rgba(26, 5, 46, 0.3) 0%, rgba(5, 1, 10, 1) 90%);
        }

        .hero { text-align: center; margin-bottom: 40px; }
        .hero i { font-size: 50px; color: var(--neon-purple); margin-bottom: 15px; filter: drop-shadow(0 0 10px var(--neon-purple)); }

        /* Input Zone */
        .search-container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        input[type="url"] {
            width: 100%;
            padding: 20px 25px;
            background: #000;
            border: 1px solid var(--deep-violet);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            padding-left: 140px; /* مساحة للزر */
        }

        input[type="url"]:focus { border-color: var(--neon-purple); box-shadow: 0 0 20px rgba(188, 19, 254, 0.15); }

        .btn-extract {
            position: absolute;
            left: 8px;
            top: 8px;
            bottom: 8px;
            background: var(--neon-purple);
            color: #fff;
            border: none;
            padding: 0 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Results Panel */
        .results-panel {
            max-width: 850px;
            margin: 30px auto;
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid #222;
            border-radius: 15px;
            padding: 25px;
            display: none;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .media-info {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        .thumb-preview {
            width: 220px;
            border-radius: 10px;
            border: 1px solid var(--neon-purple);
        }

        /* جدول الصيغ */
        .format-table {
            width: 100%;
            border-collapse: collapse;
        }

        .format-table tr { border-bottom: 1px solid #1a1a1a; }
        .format-table td { padding: 12px 10px; vertical-align: middle; }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge-video { background: #2980b9; color: white; }
        .badge-audio { background: #27ae60; color: white; }

        .dl-icon-btn {
            background: #111;
            color: var(--success);
            border: 1px solid #333;
            padding: 8px 15px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .dl-icon-btn:hover { background: var(--success); color: #000; }

        .cloud-btn {
            background: #0088cc;
            color: white;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-size: 14px;
            margin-right: 5px;
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .sidebar span { display: none; }
            .main-engine { margin-right: 70px; padding: 20px; }
            .media-info { flex-direction: column; align-items: center; text-align: center; }
            input[type="url"] { padding-left: 100px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div style="padding: 30px 10px; text-align: center;">
            <i class="fas fa-biohazard" style="font-size: 30px; color: var(--neon-purple);"></i>
        </div>
        <a href="index.html"><i class="fas fa-home"></i> <span>الرئيسية</span></a>
        <a href="downloader.html" class="active"><i class="fas fa-download"></i> <span>التحميل الذكي</span></a>
        <a href="scanner.html"><i class="fas fa-search"></i> <span>الفحص الأمني</span></a>
        <a href="editor.html"><i class="fas fa-image"></i> <span>المحرر</span></a>
    </nav>

    <main class="main-engine">
        <div class="hero">
            <i class="fas fa-cloud-download-alt"></i>
            <h1>محرك استخراج الميديا المتطور</h1>
            <p style="color: var(--text-dim);">استخرج المحتوى من YouTube, TikTok, Instagram, Facebook وأكثر من 1000 موقع.</p>
        </div>

        <div class="search-container">
            <input type="url" id="targetUrl" placeholder="ضع رابط الفيديو هنا (يوتيوب، تيك توك، إلخ)...">
            <button class="btn-extract" id="extractBtn" onclick="processExtraction()">استخراج</button>
        </div>

        <!-- لودر احترافي -->
        <div id="loader" style="display: none; text-align: center; margin: 30px;">
            <i class="fas fa-sync fa-spin" style="font-size: 40px; color: var(--neon-purple);"></i>
            <p id="loadingText" style="margin-top: 15px; font-family: 'Share Tech Mono';">BYPASSING RESTRICTIONS...</p>
        </div>

        <div class="results-panel" id="results">
            <div class="media-info">
                <img src="" id="resThumb" class="thumb-preview" alt="Preview">
                <div>
                    <h3 id="resTitle" style="margin: 0 0 10px 0;">اسم الفيديو يظهر هنا</h3>
                    <p id="resAuthor" style="color: var(--text-dim); font-size: 14px;">المصدر: --</p>
                    <div style="margin-top: 15px;">
                        <span id="resDuration" class="badge" style="background: #333;">00:00</span>
                    </div>
                </div>
            </div>

            <div style="overflow-x: auto;">
                <table class="format-table">
                    <thead>
                        <tr style="color: var(--text-dim); font-size: 12px; text-align: right;">
                            <th>الصيغة والجودة</th>
                            <th>الحجم التقديري</th>
                            <th>خيارات التحميل</th>
                        </tr>
                    </thead>
                    <tbody id="formatList">
                        <!-- سيتم ملؤها برمجياً -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        async function processExtraction() {
            const url = document.getElementById('targetUrl').value;
            if(!url) return;

            // بدء الأنيكيشن
            document.getElementById('results').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            const btn = document.getElementById('extractBtn');
            btn.disabled = true;

            try {
                // إرسال الطلب للسيرفر (Back-end)
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();

                if(data.status === 'success') {
                    displayResults(data);
                } else {
                    alert("خطأ في الاستخراج: " + data.message);
                }
            } catch (e) {
                alert("تعذر الاتصال بالمحرك. تأكد من تشغيل app.py");
            } finally {
                document.getElementById('loader').style.display = 'none';
                btn.disabled = false;
            }
        }

        function displayResults(data) {
            const panel = document.getElementById('results');
            panel.style.display = 'block';
            
            document.getElementById('resTitle').innerText = data.title;
            document.getElementById('resThumb').src = data.thumbnail;
            document.getElementById('resAuthor').innerText = "بواسطة: " + (data.uploader || "Unknown");
            
            const list = document.getElementById('formatList');
            list.innerHTML = ''; // تنظيف القائمة القديمة

            // توليد خيارات التحميل (تلقائياً بناءً على الرد من السيرفر)
            data.formats.forEach(f => {
                const tr = document.createElement('tr');
                const isAudio = f.ext === 'mp3' || f.vcodec === 'none';
                
                tr.innerHTML = `
                    <td>
                        <span class="badge ${isAudio ? 'badge-audio' : 'badge-video'}">${f.ext}</span>
                        <span style="margin-right: 10px;">${f.resolution || 'Audio'}</span>
                    </td>
                    <td style="color: var(--text-dim); font-size: 13px;">${f.filesize || '--'}</td>
                    <td>
                        <a href="${f.url}" target="_blank" class="dl-icon-btn">
                            <i class="fas fa-download"></i> تحميل
                        </a>
                        <button class="cloud-btn" onclick="sendToCloud('${f.url}')">
                            <i class="fab fa-telegram-plane"></i>
                        </button>
                    </td>
                `;
                list.appendChild(tr);
            });
        }

        function sendToCloud(url) {
            alert("جاري إرسال الملف إلى Telegram Bot الخاص بك...");
            // هنا يمكنك إضافة Fetch ليرسل الرابط للبوت الخاص بك
        }
    </script>
</body>
</html>
