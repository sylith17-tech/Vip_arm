<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kernel-0x0 | Media Intelligence Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --down-bg: #05010a;
            --neon-purple: #bc13fe;
            --neon-green: #00ff41;
            --deep-violet: #1a052e;
            --text-dim: #94a3b8;
            --success: #00f2ff;
            --danger: #ff3e3e;
            --panel-border: #1e1b26;
        }

        body {
            background-color: var(--down-bg);
            color: #f8fafc;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sidebar System (Enhanced) */
        .sidebar {
            width: 70px;
            background: #000;
            border-left: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100%;
            right: 0;
            z-index: 1000;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar:hover { width: 240px; }
        .sidebar a {
            padding: 18px 22px;
            color: #475569;
            text-decoration: none;
            display: flex;
            align-items: center;
            white-space: nowrap;
            transition: 0.3s;
        }
        .sidebar a span { display: none; margin-right: 15px; font-size: 14px; }
        .sidebar:hover a span { display: block; }
        .sidebar a:hover, .sidebar a.active {
            color: var(--neon-purple);
            background: rgba(188, 19, 254, 0.05);
            border-right: 4px solid var(--neon-purple);
        }

        /* Main Canvas */
        .main-engine {
            margin-right: 70px;
            flex: 1;
            padding: 40px;
            background: radial-gradient(circle at 10% 20%, rgba(26, 5, 46, 0.2) 0%, rgba(5, 1, 10, 1) 90%);
            transition: 0.3s;
        }

        .hero { text-align: center; margin-bottom: 40px; }
        .hero h1 { font-family: 'Share Tech Mono'; letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; }
        .platform-icons { display: flex; justify-content: center; gap: 20px; margin-top: 15px; color: #334155; font-size: 20px; }
        .platform-icons i:hover { color: var(--neon-purple); cursor: help; }

        /* Input Terminal Area */
        .search-container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
        }

        input[type="url"] {
            width: 100%;
            padding: 22px 25px;
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            padding-left: 150px;
            font-family: 'Consolas', monospace;
        }
        input[type="url"]:focus { border-color: var(--neon-purple); box-shadow: 0 0 25px rgba(188, 19, 254, 0.1); }

        .btn-extract {
            position: absolute;
            left: 10px; top: 10px; bottom: 10px;
            background: linear-gradient(45deg, var(--neon-purple), var(--deep-violet));
            color: #fff;
            border: none;
            padding: 0 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 12px;
        }
        .btn-extract:hover { transform: scale(1.02); filter: brightness(1.2); }

        /* Process Logs Console */
        .console-feed {
            max-width: 900px;
            margin: 15px auto;
            background: #000;
            border: 1px solid #111;
            border-radius: 6px;
            padding: 10px 15px;
            font-family: 'Share Tech Mono';
            font-size: 11px;
            color: var(--neon-green);
            height: 40px;
            overflow: hidden;
            display: none;
        }

        /* Results Matrix */
        .results-panel {
            max-width: 950px;
            margin: 30px auto;
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 30px;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }

        .media-header {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
            padding-bottom: 25px;
            border-bottom: 1px solid #1a1a1a;
        }

        .thumb-preview {
            width: 100%;
            border-radius: 8px;
            border: 1px solid var(--neon-purple);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Video Action Buttons */
        .action-hub {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-primary-dl {
            flex: 1;
            background: var(--success);
            color: #000;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }
        .btn-primary-dl:hover { box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); }

        .format-table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }
        .format-table tr { border-bottom: 1px solid #111; }
        .format-table td { padding: 15px 10px; font-size: 13px; }

        .badge {
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
        }
        .badge-video { background: #2980b9; color: white; }
        .badge-audio { background: #27ae60; color: white; }

        .dl-icon-btn {
            background: #111;
            color: #fff;
            border: 1px solid #333;
            padding: 6px 12px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 12px;
            transition: 0.2s;
        }
        .dl-icon-btn:hover { border-color: var(--neon-purple); color: var(--neon-purple); }

        .cloud-btn {
            background: #0088cc;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .main-engine { margin-right: 0; padding: 15px; }
            .media-header { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            input[type="url"] { padding-left: 10px; padding-top: 80px; }
            .btn-extract { width: 90%; left: 5%; top: 10px; height: 50px; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div style="padding: 30px 0; text-align: center;">
            <i class="fas fa-robot" style="font-size: 24px; color: var(--neon-purple);"></i>
        </div>
        <a href="index.html"><i class="fas fa-terminal"></i> <span>DASHBOARD</span></a>
        <a href="downloader.html" class="active"><i class="fas fa-cloud-arrow-down"></i> <span>MEDIA EXTRACTOR</span></a>
        <a href="scanner.html"><i class="fas fa-shield-halved"></i> <span>SECURITY AUDIT</span></a>
        <a href="exif.html"><i class="fas fa-fingerprint"></i> <span>FORENSIC LAB</span></a>
        <a href="editor.html"><i class="fas fa-microchip"></i> <span>NEURAL EDITOR</span></a>
    </nav>

    <main class="main-engine">
        <div class="hero">
            <i class="fas fa-satellite-dish" style="font-size: 40px; color: var(--neon-purple); filter: drop-shadow(0 0 10px var(--neon-purple));"></i>
            <h1>Media Intelligence Engine</h1>
            <p style="color: var(--text-dim);">استخراج وتحليل الوسائط من الشبكات الاجتماعية العميقة</p>
            <div class="platform-icons">
                <i class="fab fa-youtube"></i>
                <i class="fab fa-tiktok"></i>
                <i class="fab fa-instagram"></i>
                <i class="fab fa-facebook"></i>
                <i class="fab fa-twitter"></i>
                <i class="fas fa-globe"></i>
            </div>
        </div>

        <div class="search-container">
            <input type="url" id="targetUrl" placeholder="ENTER TARGET URL (YT, FB, IG, TT)...">
            <button class="btn-extract" id="extractBtn" onclick="processExtraction()">Extract Data</button>
        </div>

        <div id="consoleFeed" class="console-feed"></div>

        <div id="loader" style="display: none; text-align: center; margin: 30px;">
            <i class="fas fa-atom fa-spin" style="font-size: 40px; color: var(--neon-purple);"></i>
            <p style="margin-top: 15px; font-family: 'Share Tech Mono'; color: var(--neon-purple);">INITIALIZING BYPASS PROTOCOLS...</p>
        </div>

        <div class="results-panel" id="results">
            <div class="media-header">
                <div class="preview-zone">
                    <img src="" id="resThumb" class="thumb-preview">
                    <div class="action-hub">
                        <a href="#" id="mainDownloadBtn" class="btn-primary-dl" target="_blank">
                            <i class="fas fa-download"></i> تحميل الفيديو (HD)
                        </a>
                        <button class="cloud-btn" id="mastermindSync" onclick="sendToCloud()">
                            <i class="fab fa-telegram-plane"></i>
                        </button>
                    </div>
                </div>
                <div class="info-zone">
                    <h2 id="resTitle" style="margin: 0; font-size: 20px;">اسم المحتوى</h2>
                    <p id="resAuthor" style="color: var(--neon-purple); font-family: 'Share Tech Mono';">@source_origin</p>
                    <div style="margin: 20px 0; display: flex; gap: 10px;">
                        <span id="resDuration" class="badge" style="background: #222;">DURATION: 00:00</span>
                        <span id="resPlatform" class="badge" style="background: #222;">PLATFORM: DETECTING</span>
                    </div>
                    
                    <div style="overflow-x: auto;">
                        <table class="format-table">
                            <thead>
                                <tr style="color: var(--text-dim); font-size: 11px; text-align: right;">
                                    <th>FORMAT</th>
                                    <th>QUALITY</th>
                                    <th>SIZE</th>
                                    <th>ACTION</th>
                                </tr>
                            </thead>
                            <tbody id="formatList"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const logs = [
            "CONNECTING TO PROXY MESH...",
            "BYPASSING WAF RESTRICTIONS...",
            "EXTRACTING METADATA STRINGS...",
            "RESOLVING CDN LINKS...",
            "DONE: ASSETS READY FOR INGESTION."
        ];

        async function processExtraction() {
            const url = document.getElementById('targetUrl').value;
            if(!url) return;

            // Reset UI
            const consoleBox = document.getElementById('consoleFeed');
            consoleBox.style.display = 'block';
            document.getElementById('results').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            const btn = document.getElementById('extractBtn');
            btn.disabled = true;

            // Simulate Terminal Logs
            let i = 0;
            const logInterval = setInterval(() => {
                if(i < logs.length) {
                    consoleBox.innerText = `> ${logs[i]}`;
                    i++;
                } else {
                    clearInterval(logInterval);
                }
            }, 400);

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();

                if(data.status === 'success') {
                    displayResults(data);
                } else {
                    alert("Extraction Failed: " + data.message);
                }
            } catch (e) {
                alert("Mastermind Offline: Ensure app.py is running on port 5000");
            } finally {
                document.getElementById('loader').style.display = 'none';
                btn.disabled = false;
            }
        }

        function displayResults(data) {
            const panel = document.getElementById('results');
            panel.style.display = 'block';

            document.getElementById('resTitle').innerText = data.title;
            document.getElementById('resThumb').src = data.thumbnail;
            document.getElementById('resAuthor').innerText = `ORIGIN: ${data.uploader || 'Unknown'}`;
            document.getElementById('resDuration').innerText = `DURATION: ${data.duration_string || '--'}`;

            // Set Primary Download Button (Highest Quality Video)
            const videoFormats = data.formats.filter(f => f.vcodec !== 'none' && f.ext === 'mp4');
            if(videoFormats.length > 0) {
                document.getElementById('mainDownloadBtn').href = videoFormats[0].url;
            }

            const list = document.getElementById('formatList');
            list.innerHTML = ''; 

            data.formats.forEach(f => {
                const tr = document.createElement('tr');
                const isAudio = f.vcodec === 'none';

                tr.innerHTML = `
                    <td><span class="badge ${isAudio ? 'badge-audio' : 'badge-video'}">${f.ext.toUpperCase()}</span></td>
                    <td style="font-family: 'Share Tech Mono';">${f.resolution || 'HQ_AUDIO'}</td>
                    <td style="color: var(--text-dim);">${f.filesize_approx || f.filesize || '--'}</td>
                    <td>
                        <a href="${f.url}" target="_blank" class="dl-icon-btn">GET</a>
                    </td>
                `;
                list.appendChild(tr);
            });
        }

        function sendToCloud() {
            const url = document.getElementById('targetUrl').value;
            alert("Uplinking to Telegram Bot... Processing remote download via VIP_ARM OS.");
            // Your API call to Mastermind for Telegram remote download goes here
            fetch('/api/telegram_sync', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ media_url: url })
            });
        }
    </script>
</body>
</html>
