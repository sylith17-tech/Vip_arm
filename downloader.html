<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kernel-0x0 | Media Extraction Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --down-bg: #05010a;
            --neon-purple: #bc13fe;
            --deep-violet: #1a052e;
            --text-dim: #94a3b8;
            --success: #00f2ff;
        }

        body {
            background-color: var(--down-bg);
            color: #f8fafc;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Identity */
        .sidebar {
            width: 260px;
            background: #000;
            border-right: 1px solid var(--deep-violet);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid #0a0a0a;
        }

        .sidebar a {
            padding: 15px 25px;
            text-decoration: none;
            color: #475569;
            display: flex;
            align-items: center;
            transition: 0.3s;
            border-left: 4px solid transparent;
        }

        .sidebar a:hover, .sidebar a.active {
            color: var(--neon-purple);
            background: rgba(188, 19, 254, 0.03);
            border-left: 4px solid var(--neon-purple);
        }

        .sidebar a i { margin-right: 15px; width: 20px; text-align: center; }

        /* Main Workspace */
        .main-engine {
            flex: 1;
            padding: 50px;
            overflow-y: auto;
            background: radial-gradient(circle at center, #0f021a 0%, #05010a 100%);
        }

        .hero {
            text-align: center;
            margin-bottom: 50px;
        }

        .hero i {
            font-size: 60px;
            color: var(--neon-purple);
            text-shadow: 0 0 20px rgba(188, 19, 254, 0.5);
            margin-bottom: 15px;
        }

        .search-container {
            max-width: 750px;
            margin: 0 auto;
            position: relative;
        }

        input[type="url"] {
            width: 100%;
            padding: 22px 35px;
            background: #000;
            border: 1px solid var(--deep-violet);
            border-radius: 15px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input[type="url"]:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.2);
        }

        .btn-extract {
            position: absolute;
            right: 10px;
            top: 10px;
            bottom: 10px;
            background: var(--neon-purple);
            color: #fff;
            border: none;
            padding: 0 35px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-extract:hover { filter: brightness(1.2); }

        /* Results Display */
        .results-panel {
            max-width: 800px;
            margin: 40px auto;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 20px;
            padding: 30px;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .media-meta {
            display: flex;
            gap: 25px;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 25px;
        }

        .thumb-preview {
            width: 240px;
            height: 135px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid var(--deep-violet);
        }

        .meta-text h3 { margin: 0 0 10px 0; color: var(--neon-purple); }
        .meta-text p { margin: 0; font-size: 14px; color: var(--text-dim); }

        .format-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 25px;
        }

        .download-btn {
            background: #111;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #222;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            color: #fff;
        }

        .download-btn:hover {
            border-color: var(--success);
            background: rgba(0, 242, 255, 0.05);
        }

        /* Loading Animation */
        .shimmer {
            display: none;
            width: 60px;
            height: 60px;
            border: 4px solid var(--deep-violet);
            border-left-color: var(--neon-purple);
            border-radius: 50%;
            margin: 30px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-cloud-arrow-down" style="font-size: 45px; color: var(--neon-purple);"></i>
            <h3 style="color: #fff; margin-top: 15px; letter-spacing: 1px;">KERNEL-0x0</h3>
        </div>
        <a href="index.html"><i class="fas fa-terminal"></i> Dashboard</a>
        <a href="editor.html"><i class="fas fa-wand-magic-sparkles"></i> Image Studio</a>
        <a href="exif.html"><i class="fas fa-search-location"></i> EXIF Forensic</a>
        <a href="downloader.html" class="active"><i class="fas fa-play-circle"></i> Media Downloader</a>
        <a href="scanner.html"><i class="fas fa-shield-virus"></i> Security Scanner</a>
        <a href="contact.html"><i class="fas fa-headset"></i> HQ Support</a>
    </nav>

    <div class="main-engine">
        <div class="hero">
            <i class="fas fa-bolt"></i>
            <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Media Stream Extractor</h1>
            <p style="color: var(--text-dim);">Intercept and download media from bypass-restricted social platforms.</p>
        </div>

        <div class="search-container">
            <input type="url" id="targetUrl" placeholder="Enter link: TikTok, YouTube, IG, FB...">
            <button class="btn-extract" id="extractBtn" onclick="extractMedia()">EXTRACT</button>
        </div>

        <div class="shimmer" id="shimmer"></div>

        <div class="results-panel" id="results">
            <div class="media-meta">
                <img src="" id="resThumb" class="thumb-preview" alt="Preview">
                <div class="meta-text">
                    <h3 id="resTitle">Fetching Stream...</h3>
                    <p id="resSource">Source: Verified</p>
                    <p id="resStatus" style="color: var(--success); margin-top: 5px;"><i class="fas fa-check-circle"></i> Ready for Extraction</p>
                </div>
            </div>

            <div class="format-grid">
                <!-- الرابط المباشر سيتم وضعه هنا برمجياً -->
                <a href="#" id="primaryDownload" class="download-btn" onclick="triggerDL('HD Video')">
                    <span>MP4 High Quality</span>
                    <i class="fas fa-video"></i>
                </a>
                <a href="#" class="download-btn" onclick="triggerDL('Audio Only')">
                    <span>MP3 Audio (HQ)</span>
                    <i class="fas fa-music"></i>
                </a>
                <a href="#" class="download-btn" onclick="triggerDL('No Watermark')">
                    <span>No Watermark (TT)</span>
                    <i class="fas fa-eye-slash"></i>
                </a>
            </div>
        </div>
    </div>

    <script>
        // متغير عالمي لحفظ الرابط المستخرج
        let currentStreamUrl = "";

        async function extractMedia() {
            const urlInput = document.getElementById('targetUrl').value;
            const resPanel = document.getElementById('results');
            const shim = document.getElementById('shimmer');
            const extractBtn = document.getElementById('extractBtn');

            if(!urlInput) return alert("System requires a target URL.");

            // تحضير الواجهة للتحميل
            resPanel.style.display = 'none';
            shim.style.display = 'block';
            extractBtn.disabled = true;
            extractBtn.innerText = "WAIT...";

            try {
                // إرسال الطلب إلى سيرفر Flask الخاص بك (app.py)
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    // عرض النتائج الحقيقية
                    shim.style.display = 'none';
                    resPanel.style.display = 'block';
                    
                    document.getElementById('resTitle').innerText = result.title;
                    document.getElementById('resSource').innerText = "Source Origin: " + new URL(urlInput).hostname;
                    document.getElementById('resThumb').src = result.thumbnail || 'https://via.placeholder.com/240x135?text=Media+Found';
                    
                    // حفظ الرابط المباشر لاستخدامه عند الضغط على أزرار التحميل
                    currentStreamUrl = result.download_link;
                } else {
                    alert("Extraction Error: " + result.message);
                    shim.style.display = 'none';
                }
            } catch (error) {
                console.error("Kernel-0x0 Connection Error:", error);
                alert("Failed to connect to backend engine.");
                shim.style.display = 'none';
            } finally {
                extractBtn.disabled = false;
                extractBtn.innerText = "EXTRACT";
            }
        }

        function triggerDL(type) {
            if (!currentStreamUrl) {
                return alert("No active stream captured. Please extract first.");
            }
            
            // فتح الرابط المباشر في تبويب جديد لبدء التحميل
            window.open(currentStreamUrl, '_blank');
        }

        // Security Lockdown (اختياري - لحماية الكود الخاص بك)
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = (e) => {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false;
        };
    </script>
</body>
</html>
